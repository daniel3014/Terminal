<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <title>Terminal</title>

  <style>
    :root{
      --bg0: #06080f;
      --bg1: #0a1020;

      --glass: rgba(255,255,255,0.10);
      --glass2: rgba(255,255,255,0.14);
      --stroke: rgba(255,255,255,0.18);
      --stroke2: rgba(255,255,255,0.26);

      --text: rgba(255,255,255,0.92);
      --muted: rgba(255,255,255,0.62);

      --accent: 105, 199, 255;

      --radius: 22px;
      --radius2: 28px;

      /* Grid system */
      --cell: 120px;
      --gap: 14px;
      --pad: 16px;
      --step: 134px; /* synced by JS = cell+gap */

      /* Border thickness compensation */
      --b: 1px;

      --gridDot: rgba(255,255,255,0.10);

      --ease: cubic-bezier(.2,.9,.2,1);
    }

    html[data-theme="light"]{
      --bg0: #f5f7ff;
      --bg1: #dfe7ff;

      --glass: rgba(255,255,255,0.62);
      --glass2: rgba(255,255,255,0.52);
      --stroke: rgba(10,20,40,0.10);
      --stroke2: rgba(10,20,40,0.16);

      --text: rgba(10,18,34,0.90);
      --muted: rgba(10,18,34,0.56);

      --gridDot: rgba(10,20,40,0.10);
    }

    @media (max-width: 640px){
      :root{
        --cell: 104px;
        --gap: 12px;
        --pad: 12px;
        --radius: 20px;
        --radius2: 26px;
      }
    }

    *{ box-sizing:border-box; }
    html, body{
      width:100%;
      height:100%;
      margin:0;
      padding:0;
      overflow:hidden;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      color: var(--text);
      background:
        radial-gradient(1200px 900px at 20% 10%, rgba(var(--accent),0.18), transparent 55%),
        radial-gradient(900px 900px at 80% 40%, rgba(140,120,255,0.16), transparent 55%),
        linear-gradient(160deg, var(--bg0), var(--bg1));
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(1px 1px at 20px 30px, rgba(255,255,255,0.05), transparent 50%),
        radial-gradient(1px 1px at 70px 90px, rgba(255,255,255,0.04), transparent 50%),
        radial-gradient(1px 1px at 140px 60px, rgba(255,255,255,0.04), transparent 50%);
      background-size: 220px 220px;
      mix-blend-mode: overlay;
      opacity: 0.55;
      filter: blur(0.2px);
    }

    .stage{
      position:relative;
      width:100%;
      height:100%;
      padding: var(--pad);
      isolation:isolate;
    }

    /* Grid overlay — dots only, only in edit mode */
    .grid-overlay{
      position:absolute;
      inset: var(--pad);
      border-radius: var(--radius2);
      pointer-events:none;
      z-index: 0;

      background: radial-gradient(var(--gridDot) 1px, transparent 1px);
      background-size: 18px 18px;

      opacity: 0;
      transition: opacity 220ms var(--ease);
      mask-image: radial-gradient(120% 120% at 50% 40%, #000 55%, transparent 100%);
    }
    /* slightly more visible */
    .stage.edit-mode .grid-overlay{ opacity: 0.55; }

    .widget-area{
      position:absolute;
      inset: var(--pad);
      border-radius: var(--radius2);
      z-index: 1;
    }

    .widget{
      position:absolute;
      border-radius: var(--radius);
      background: linear-gradient(180deg, var(--glass), var(--glass2));
      border: var(--b) solid var(--stroke);
      backdrop-filter: blur(16px) saturate(140%);
      -webkit-backdrop-filter: blur(16px) saturate(140%);
      overflow: visible;
      user-select:none;
      touch-action:none;
      transform: translate3d(0,0,0);
      will-change: transform, left, top;
      z-index: 2;
    }

    /* Shadow lower layer */
    .widget::before{
      content:"";
      position:absolute;
      inset:-10px;
      border-radius: calc(var(--radius) + 10px);
      z-index:-1;
      pointer-events:none;
      box-shadow:
        0 14px 40px rgba(0,0,0,0.28),
        0 4px 16px rgba(0,0,0,0.20);
      opacity: 0.95;
      filter: blur(0.2px);
    }
    html[data-theme="light"] .widget::before{
      box-shadow:
        0 14px 38px rgba(10,20,40,0.18),
        0 4px 14px rgba(10,20,40,0.12);
      opacity: 0.85;
    }

    .widget.dragging{
      cursor: grabbing;
      z-index: 50;
    }

    .pad{ padding: 14px; }

    /* Ghost preview */
    .snap-ghost{
      position:absolute;
      border-radius: var(--radius);
      border: 1px dashed rgba(var(--accent),0.55);
      background: rgba(var(--accent),0.10);
      box-shadow: 0 0 0 8px rgba(var(--accent),0.06);
      pointer-events:none;
      z-index: 10;
      opacity: 0;
      transition: opacity 180ms var(--ease);
    }
    .snap-ghost.visible{ opacity: 1; }

    /* Clock */
    .clock-widget{
      width: calc(var(--cell) * 2 + var(--gap) - (var(--b) * 2));
      height: calc(var(--cell) * 1 - (var(--b) * 2));
    }
    .big-time{
      font-size: 34px;
      font-weight: 800;
      letter-spacing: 0.2px;
      line-height: 1.05;
    }
    .date-line{
      margin-top: 6px;
      font-size: 13px;
      color: var(--muted);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
    }
    .subline{
      margin-top: 10px;
      font-size: 12.5px;
      color: var(--muted);
      line-height: 1.25rem;
    }

    /* Theme slider */
    .theme-widget{
      width: calc(var(--cell) * 2 + var(--gap) - (var(--b) * 2));
      height: calc(var(--cell) * 1 - (var(--b) * 2));
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .theme-pill{
      position:relative;
      width: 100%;
      height: 44px;
      border-radius: 999px;
      border: 1px solid var(--stroke2);
      background: rgba(0,0,0,0.10);
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 6px;
      touch-action:none;
    }
    html[data-theme="light"] .theme-pill{ background: rgba(255,255,255,0.35); }

    .theme-options{
      position:relative;
      width: 100%;
      height: 100%;
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      align-items:center;
      z-index: 2;
    }
    .theme-opt{
      display:flex;
      align-items:center;
      justify-content:center;
      font-size: 13px;
      color: var(--muted);
      user-select:none;
      cursor:pointer;
    }
    .theme-opt.active{ color: var(--text); }

    .ico{
      width: 18px;
      height: 18px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      opacity: 0.92;
    }

    .theme-thumb{
      position:absolute;
      top: 6px;
      bottom: 6px;
      width: calc((100% - 12px) / 3);
      left: 6px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255,255,255,0.28), rgba(255,255,255,0.14));
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.18),
        0 10px 24px rgba(0,0,0,0.18);
      backdrop-filter: blur(14px) saturate(140%);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
      transform: translate3d(0,0,0);
      transition: transform 240ms var(--ease);
      z-index: 1;
      will-change: transform;
    }
    html[data-theme="light"] .theme-thumb{
      background: linear-gradient(180deg, rgba(255,255,255,0.70), rgba(255,255,255,0.35));
      border: 1px solid rgba(10,20,40,0.12);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.35),
        0 10px 20px rgba(10,20,40,0.12);
    }

    /* Chat */
    .chat-widget{
      width: calc(var(--cell) * 3 + (var(--gap) * 2) - (var(--b) * 2));
      height: calc(var(--cell) * 1 - (var(--b) * 2));
      display:flex;
      align-items:center;
    }
    .chat-row{
      width:100%;
      display:flex;
      align-items:center;
      gap: 10px;
    }
    .cmd{
      flex:1 1 auto;
      height: 44px;
      border-radius: 999px;
      border: 1px solid var(--stroke2);
      background: rgba(0,0,0,0.12);
      color: var(--text);
      padding: 0 14px;
      outline: none;
      font-size: 14px;
    }
    html[data-theme="light"] .cmd{ background: rgba(255,255,255,0.40); }
    .cmd:focus{
      box-shadow: 0 0 0 6px rgba(var(--accent),0.18);
      border-color: rgba(var(--accent),0.45);
    }
    .hint{
      flex:0 0 auto;
      font-size: 12px;
      color: var(--muted);
      white-space:nowrap;
    }
  </style>
</head>

<body>
  <div class="stage" id="stage">
    <div class="grid-overlay" id="grid"></div>

    <div class="widget-area" id="area">
      <div class="snap-ghost" id="ghost"></div>

      <!-- Clock -->
      <div class="widget clock-widget" data-id="clock" data-kind="clock">
        <div class="pad">
          <div class="big-time" id="clock">--:--</div>
          <div class="date-line">
            <div id="dateLabel">—</div>
            <div style="color:var(--muted); font-size:12px;" id="secondsLabel"></div>
          </div>
          <div class="subline">Lisboa</div>
        </div>
      </div>

      <!-- Chat -->
      <div class="widget chat-widget" data-id="chat" data-kind="chat">
        <div class="pad" style="width:100%;">
          <div class="chat-row">
            <input class="cmd" id="cmd" autocomplete="off" spellcheck="false" placeholder='Digite um comando…'/>
            <div class="hint">Enter ↵</div>
          </div>
        </div>
      </div>

      <!-- Theme slider -->
      <div class="widget theme-widget" data-id="theme" data-kind="theme">
        <div class="pad" style="width:100%;">
          <div class="theme-pill" id="themePill">
            <div class="theme-thumb" id="themeThumb"></div>

            <div class="theme-options" id="themeOptions">
              <div class="theme-opt" data-theme="light" title="Light"><span class="ico">☀️</span></div>
              <div class="theme-opt" data-theme="dark"  title="Dark"><span class="ico">🌙</span></div>
              <div class="theme-opt" data-theme="auto"  title="Auto"><span class="ico">✨</span></div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    const stage = document.getElementById('stage');
    const area  = document.getElementById('area');
    const ghost = document.getElementById('ghost');
    const cmd   = document.getElementById('cmd');

    const clamp = (v, min, max) => Math.max(min, Math.min(max, v));
    const prefersDark = () => window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;

    function getVars(){
      const cs = getComputedStyle(document.documentElement);
      const cell = parseFloat(cs.getPropertyValue('--cell')) || 120;
      const gap  = parseFloat(cs.getPropertyValue('--gap'))  || 14;
      const step = cell + gap;
      return { cell, gap, step };
    }

    function syncStepVar(){
      const { step } = getVars();
      document.documentElement.style.setProperty('--step', step + 'px');
    }

    function areaRect(){ return area.getBoundingClientRect(); }

    // Center widgets inside grid spacing (gap/2 inset) but allow touching outer edges by clamping
    function colRowToPx(col, row){
      const { step, gap } = getVars();
      const inset = gap / 2;
      return { leftRaw: col * step + inset, topRaw: row * step + inset };
    }

    function pxToColRow(absX, absY){
      const { step, gap } = getVars();
      const r = areaRect();
      const inset = gap / 2;
      const rx = (absX - r.left) - inset;
      const ry = (absY - r.top)  - inset;
      return { col: Math.round(rx / step), row: Math.round(ry / step) };
    }

    function getSpan(w){
      const { step } = getVars();
      const spanX = Math.max(1, Math.ceil(w.offsetWidth  / step));
      const spanY = Math.max(1, Math.ceil(w.offsetHeight / step));
      return { spanX, spanY };
    }

    function maxColsRowsFor(w){
      const { step, gap } = getVars();
      const r = areaRect();
      const usableW = Math.max(1, r.width  - gap);
      const usableH = Math.max(1, r.height - gap);

      const cols = Math.max(1, Math.floor(usableW / step));
      const rows = Math.max(1, Math.floor(usableH / step));

      const { spanX, spanY } = getSpan(w);
      return {
        cols,
        rows,
        maxCol: Math.max(0, cols - spanX),
        maxRow: Math.max(0, rows - spanY)
      };
    }

    function buildOccupancy(exceptId=null){
      const occ = new Set();
      document.querySelectorAll('.widget').forEach(w=>{
        if(w.style.display === 'none') return;
        const id = w.dataset.id;
        if(exceptId && id === exceptId) return;

        const col = parseInt(w.dataset.col || '0', 10);
        const row = parseInt(w.dataset.row || '0', 10);
        const { spanX, spanY } = getSpan(w);

        for(let y=0; y<spanY; y++){
          for(let x=0; x<spanX; x++){
            occ.add(`${col+x},${row+y}`);
          }
        }
      });
      return occ;
    }

    function canPlace(w, col, row, occ){
      const { maxCol, maxRow } = maxColsRowsFor(w);
      col = clamp(col, 0, maxCol);
      row = clamp(row, 0, maxRow);

      const { spanX, spanY } = getSpan(w);
      for(let y=0; y<spanY; y++){
        for(let x=0; x<spanX; x++){
          if(occ.has(`${col+x},${row+y}`)) return false;
        }
      }
      return true;
    }

    function findNearestFreeCell(w, desiredCol, desiredRow){
      const { maxCol, maxRow } = maxColsRowsFor(w);
      desiredCol = clamp(desiredCol, 0, maxCol);
      desiredRow = clamp(desiredRow, 0, maxRow);

      const occ = buildOccupancy(w.dataset.id);
      const maxRadius = Math.max(maxCol, maxRow) + 6;

      for(let rad=0; rad<=maxRadius; rad++){
        for(let dr=-rad; dr<=rad; dr++){
          for(let dc=-rad; dc<=rad; dc++){
            if(Math.abs(dc) !== rad && Math.abs(dr) !== rad) continue;
            const col = desiredCol + dc;
            const row = desiredRow + dr;
            if(col < 0 || row < 0 || col > maxCol || row > maxRow) continue;
            if(canPlace(w, col, row, occ)) return { col, row };
          }
        }
      }
      return { col: desiredCol, row: desiredRow };
    }

    function placePxForWidget(w, col, row){
      const r = areaRect();
      const { leftRaw, topRaw } = colRowToPx(col, row);
      const maxLeft = Math.max(0, r.width  - w.offsetWidth);
      const maxTop  = Math.max(0, r.height - w.offsetHeight);
      return {
        left: clamp(leftRaw, 0, maxLeft),
        top:  clamp(topRaw,  0, maxTop)
      };
    }

    function setGhost(w, col, row){
      const p = placePxForWidget(w, col, row);
      ghost.style.width  = w.offsetWidth + 'px';
      ghost.style.height = w.offsetHeight + 'px';
      ghost.style.left   = p.left + 'px';
      ghost.style.top    = p.top  + 'px';
      ghost.classList.add('visible');
    }
    function hideGhost(){ ghost.classList.remove('visible'); }

    // ---------- Persistence (col/row) ----------
    const STORAGE_KEY = 'terminal.layout.v5';
    const EDIT_KEY    = 'terminal.editmode.v1';

    function loadLayout(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? (JSON.parse(raw) || {}) : {};
      }catch(e){ return {}; }
    }
    function saveLayout(layout){
      try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(layout)); }catch(e){}
    }

    function commitWidgetCell(w, col, row){
      w.dataset.col = String(col);
      w.dataset.row = String(row);

      const p = placePxForWidget(w, col, row);
      w.style.left = p.left + 'px';
      w.style.top  = p.top  + 'px';

      const layout = loadLayout();
      const id = w.dataset.id;
      layout[id] = layout[id] || {};
      layout[id].col = col;
      layout[id].row = row;
      layout[id].hidden = false;
      saveLayout(layout);
    }

    function applyLayout(){
      const layout = loadLayout();
      document.querySelectorAll('.widget').forEach(w=>{
        const id = w.dataset.id;

        if(layout[id] && layout[id].hidden){
          w.style.display = 'none';
          return;
        } else {
          w.style.display = '';
        }

        const col = (layout[id] && typeof layout[id].col === 'number') ? layout[id].col : null;
        const row = (layout[id] && typeof layout[id].row === 'number') ? layout[id].row : null;

        if(col !== null && row !== null){
          commitWidgetCell(w, col, row);
        }
      });
    }

    function hideWidget(id){
      const w = document.querySelector(`.widget[data-id="${id}"]`);
      if(!w) return false;
      w.style.display = 'none';
      const layout = loadLayout();
      layout[id] = layout[id] || {};
      layout[id].hidden = true;
      saveLayout(layout);
      return true;
    }

    function defaultLayoutIfNeeded(){
      const layout = loadLayout();
      if(Object.keys(layout).length) return;

      const clock = document.querySelector('.widget[data-id="clock"]');
      const chat  = document.querySelector('.widget[data-id="chat"]');
      const theme = document.querySelector('.widget[data-id="theme"]');

      const desired = [
        { w: clock, col: 0, row: 0 },
        { w: chat,  col: 2, row: 0 },
        { w: theme, col: 5, row: 0 },
      ];

      desired.forEach(({w,col,row})=>{
        if(!w) return;
        const free = findNearestFreeCell(w, col, row);
        commitWidgetCell(w, free.col, free.row);
      });
    }

    // ---------- Edit mode ----------
    let isEditMode = false;

    function setEditMode(on){
      isEditMode = !!on;
      stage.classList.toggle('edit-mode', isEditMode);
      try{ localStorage.setItem(EDIT_KEY, isEditMode ? '1' : '0'); }catch(e){}
      if(!isEditMode) hideGhost();
    }

    // Hold toggles edit mode
    const HOLD_MS = 450;
    let hold = null;

    function startHold(e){
      clearHold();
      hold = {
        startX: e.clientX,
        startY: e.clientY,
        timer: setTimeout(()=>{
          setEditMode(!isEditMode);
          clearHold();
        }, HOLD_MS)
      };
    }
    function clearHold(){
      if(!hold) return;
      clearTimeout(hold.timer);
      hold = null;
    }

    // Tap empty exits edit mode
    stage.addEventListener('pointerdown', (e)=>{
      if(!isEditMode) return;
      if(e.target.closest('.widget')) return;
      setEditMode(false);
    }, true);

    // ---------- Drag/drop (edit mode only) ----------
    let drag = null;

    function canStartDragFromTarget(target){
      if(target.closest('#themePill')) return false;
      if(target.closest('input, textarea, button, select')) return false;
      return true;
    }

    function onPointerDown(e){
      const w = e.target.closest('.widget');
      if(!w) return;

      startHold(e);

      if(!isEditMode) return;
      if(!canStartDragFromTarget(e.target)) return;

      e.preventDefault();

      drag = {
        w,
        startX: e.clientX,
        startY: e.clientY,
        originCol: parseInt(w.dataset.col || '0', 10),
        originRow: parseInt(w.dataset.row || '0', 10),
        dx: 0,
        dy: 0
      };

      w.classList.add('dragging');
      w.setPointerCapture(e.pointerId);
    }

    function onPointerMove(e){
      if(hold){
        const md = Math.abs(e.clientX - hold.startX) + Math.abs(e.clientY - hold.startY);
        if(md > 6) clearHold();
      }
      if(!drag) return;

      const w = drag.w;
      drag.dx = e.clientX - drag.startX;
      drag.dy = e.clientY - drag.startY;

      w.style.transform = `translate3d(${drag.dx}px, ${drag.dy}px, 0)`;

      // Get current pixel origin from stored cell
      const originPx = placePxForWidget(w, drag.originCol, drag.originRow);
      const r = areaRect();
      const absX = (r.left + originPx.left) + drag.dx;
      const absY = (r.top  + originPx.top ) + drag.dy;

      const { col, row } = pxToColRow(absX, absY);
      const free = findNearestFreeCell(w, col, row);

      setGhost(w, free.col, free.row);
    }

    function onPointerUp(e){
      clearHold();
      if(!drag) return;

      const w = drag.w;

      const originPx = placePxForWidget(w, drag.originCol, drag.originRow);
      const r = areaRect();
      const absX = (r.left + originPx.left) + drag.dx;
      const absY = (r.top  + originPx.top ) + drag.dy;

      const { col, row } = pxToColRow(absX, absY);
      const free = findNearestFreeCell(w, col, row);

      w.style.transform = 'translate3d(0,0,0)';
      commitWidgetCell(w, free.col, free.row);

      w.classList.remove('dragging');
      hideGhost();
      drag = null;
    }

    area.addEventListener('pointerdown', onPointerDown);
    window.addEventListener('pointermove', onPointerMove);
    window.addEventListener('pointerup', onPointerUp);

    // ---------- Theme (default AUTO) ----------
    const themeThumb   = document.getElementById('themeThumb');
    const themeOptions = document.getElementById('themeOptions');
    const themePill    = document.getElementById('themePill');

    const THEME_KEY = 'terminal.theme.mode.v2';

    function applyTheme(mode){
      let applied = mode;
      if(mode === 'auto'){
        applied = prefersDark() ? 'dark' : 'light';
      }
      document.documentElement.setAttribute('data-theme', applied);
    }

    function setTheme(mode){
      localStorage.setItem(THEME_KEY, mode);

      applyTheme(mode);

      [...themeOptions.querySelectorAll('.theme-opt')].forEach(opt=>{
        opt.classList.toggle('active', opt.dataset.theme === mode);
      });

      // Slot snap (px-based)
      themeThumb.style.transition = 'transform 240ms var(--ease)';
      themeThumb.style.transform = `translate3d(${slotXForMode(mode)}px,0,0)`;
    }

    function loadTheme(){
      const saved = localStorage.getItem(THEME_KEY) || 'auto'; // ✅ default auto
      setTheme(saved);
    }

    function slotXForMode(mode){
      const rect = themePill.getBoundingClientRect();
      const thumbW = themeThumb.getBoundingClientRect().width || 0;
      const inner = rect.width - 12; // 6px + 6px
      const range = Math.max(0, inner - thumbW);
      const idx = (mode === 'light') ? 0 : (mode === 'dark' ? 1 : 2);
      return range * (idx / 2);
    }

    // Tap to change (kept)
    themeOptions.addEventListener('click', (e)=>{
      const opt = e.target.closest('.theme-opt');
      if(!opt) return;
      setTheme(opt.dataset.theme);
    });

    // Smooth drag — PX based (fixes broken thumb) ✅
    let pillDrag = null;
    let rafId = 0;

    function thumbXFromClientX(clientX, rect, thumbW){
      const innerLeft = 6;
      const innerRight = rect.width - 6;
      const innerW = innerRight - innerLeft;
      const range = Math.max(0, innerW - thumbW);

      // map clientX to center the thumb
      const local = clamp(clientX - rect.left - innerLeft, 0, innerW);
      const centered = clamp(local - thumbW/2, 0, range);
      return centered;
    }

    function renderThumbX(px){
      themeThumb.style.transition = 'none';
      themeThumb.style.transform = `translate3d(${px}px,0,0)`;
    }

    themePill.addEventListener('pointerdown', (e)=>{
      e.preventDefault();
      const rect = themePill.getBoundingClientRect();
      const thumbW = themeThumb.getBoundingClientRect().width || 0;
      pillDrag = { rect, thumbW, lastX: e.clientX };
      themePill.setPointerCapture(e.pointerId);

      renderThumbX(thumbXFromClientX(e.clientX, rect, thumbW));
    });

    themePill.addEventListener('pointermove', (e)=>{
      if(!pillDrag) return;
      pillDrag.lastX = e.clientX;

      if(rafId) return;
      rafId = requestAnimationFrame(()=>{
        rafId = 0;
        renderThumbX(thumbXFromClientX(pillDrag.lastX, pillDrag.rect, pillDrag.thumbW));
      });
    });

    themePill.addEventListener('pointerup', (e)=>{
      if(!pillDrag) return;

      const { rect, thumbW } = pillDrag;
      pillDrag = null;

      const innerW = rect.width - 12;
      const range = Math.max(0, innerW - thumbW);

      const x = thumbXFromClientX(e.clientX, rect, thumbW);
      const t = range === 0 ? 0 : (x / range); // 0..1
      const idx = clamp(Math.round(t * 2), 0, 2);

      const mode = idx === 0 ? 'light' : (idx === 1 ? 'dark' : 'auto');
      setTheme(mode);
    });

    window.matchMedia('(prefers-color-scheme: dark)').addEventListener?.('change', ()=>{
      const saved = localStorage.getItem(THEME_KEY) || 'auto';
      if(saved === 'auto'){
        applyTheme('auto');
      }
    });

    // ---------- Clock ----------
    const clockEl = document.getElementById('clock');
    const dateLabel = document.getElementById('dateLabel');
    const secondsLabel = document.getElementById('secondsLabel');

    function tick(){
      const now = new Date();
      const hh = String(now.getHours()).padStart(2,'0');
      const mm = String(now.getMinutes()).padStart(2,'0');
      const ss = String(now.getSeconds()).padStart(2,'0');

      clockEl.textContent = `${hh}:${mm}`;
      secondsLabel.textContent = ss;

      const weekday = new Intl.DateTimeFormat('pt-PT', { weekday:'long' }).format(now);
      const dd = String(now.getDate()).padStart(2,'0');
      const mo = String(now.getMonth()+1).padStart(2,'0');
      dateLabel.textContent = `${weekday}, ${dd}/${mo}`;
    }

    // ---------- Commands ----------
    function runCommand(raw){
      const input = raw.trim().toLowerCase();
      if(!input) return;

      if(input.includes('remove theme') || input.includes('remover tema')) return hideWidget('theme');
      if(input.includes('remove chat')  || input.includes('remover chat')) return hideWidget('chat');

      if(input.includes('theme ') || input.includes('tema ')){
        if(input.includes('dark') || input.includes('escuro')) return setTheme('dark');
        if(input.includes('light')|| input.includes('claro'))  return setTheme('light');
        if(input.includes('auto')) return setTheme('auto');
      }
    }

    cmd.addEventListener('keydown', (e)=>{
      if(e.key === 'Enter'){
        runCommand(cmd.value);
        cmd.value = '';
      }
    });

    // ---------- Normalize layout ----------
    function normalizeAll(){
      const widgets = [...document.querySelectorAll('.widget')].filter(w=>w.style.display !== 'none');
      widgets.forEach(w=>{
        if(w.dataset.col == null) w.dataset.col = '0';
        if(w.dataset.row == null) w.dataset.row = '0';
      });

      for(const w of widgets){
        const col = parseInt(w.dataset.col || '0', 10);
        const row = parseInt(w.dataset.row || '0', 10);
        const free = findNearestFreeCell(w, col, row);
        commitWidgetCell(w, free.col, free.row);
      }
    }

    // ---------- Boot ----------
    function boot(){
      syncStepVar();
      loadTheme();

      // edit mode persisted
      const em = localStorage.getItem('terminal.editmode.v1');
      setEditMode(em === '1');

      defaultLayoutIfNeeded();
      applyLayout();
      normalizeAll();

      tick();
      setInterval(tick, 1000);

      window.addEventListener('resize', ()=>{
        syncStepVar();
        normalizeAll();
        // keep slider correct after resize
        const saved = localStorage.getItem(THEME_KEY) || 'auto';
        themeThumb.style.transition = '';
        themeThumb.style.transform = `translate3d(${slotXForMode(saved)}px,0,0)`;
      });
    }

    boot();
  </script>
</body>
</html>
