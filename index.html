<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <title>Jarvis Terminal</title>

  <style>
    /* =========================================================
       JARVIS TERMINAL — Premium Liquid Glass UI
       (Edit Mode + Grid (only on edit) + Drag/Drop + Snap + Anti-overlap
        Theme slider smooth drag + Chat as widget)
       ========================================================= */

    :root{
      --bg0: #06080f;
      --bg1: #0a1020;
      --glass: rgba(255,255,255,0.10);
      --glass2: rgba(255,255,255,0.14);
      --stroke: rgba(255,255,255,0.18);
      --stroke2: rgba(255,255,255,0.26);
      --text: rgba(255,255,255,0.92);
      --muted: rgba(255,255,255,0.62);

      --accent: 105, 199, 255;     /* RGB only */

      --radius: 22px;
      --radius2: 28px;

      /* Grid */
      --cell: 120px;
      --gap: 14px;
      --pad: 16px;

      /* computed via JS too */
      --gridLine: rgba(255,255,255,0.10);
      --gridDot: rgba(255,255,255,0.09);

      --ease: cubic-bezier(.2,.9,.2,1);
    }

    html[data-theme="light"]{
      --bg0: #f5f7ff;
      --bg1: #dfe7ff;
      --glass: rgba(255,255,255,0.62);
      --glass2: rgba(255,255,255,0.52);
      --stroke: rgba(10,20,40,0.10);
      --stroke2: rgba(10,20,40,0.16);
      --text: rgba(10,18,34,0.90);
      --muted: rgba(10,18,34,0.56);
      --gridLine: rgba(10,20,40,0.10);
      --gridDot: rgba(10,20,40,0.09);
    }

    @media (max-width: 640px){
      :root{
        --cell: 104px;
        --gap: 12px;
        --pad: 12px;
        --radius: 20px;
        --radius2: 26px;
      }
    }

    *{ box-sizing:border-box; }
    html, body{
      width:100%;
      height:100%;
      margin:0;
      padding:0;
      overflow:hidden;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      color: var(--text);
      background:
        radial-gradient(1200px 900px at 20% 10%, rgba(var(--accent),0.18), transparent 55%),
        radial-gradient(900px 900px at 80% 40%, rgba(140,120,255,0.16), transparent 55%),
        linear-gradient(160deg, var(--bg0), var(--bg1));
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(1px 1px at 20px 30px, rgba(255,255,255,0.05), transparent 50%),
        radial-gradient(1px 1px at 70px 90px, rgba(255,255,255,0.04), transparent 50%),
        radial-gradient(1px 1px at 140px 60px, rgba(255,255,255,0.04), transparent 50%);
      background-size: 220px 220px;
      mix-blend-mode: overlay;
      opacity: 0.55;
      filter: blur(0.2px);
    }

    /* =========================
       Stage
       ========================= */
    .stage{
      position:relative;
      width:100%;
      height:100%;
      padding: var(--pad);
      isolation:isolate;
    }

    /* Grid overlay — only visible in edit mode */
    .grid-overlay{
      position:absolute;
      inset: var(--pad);
      border-radius: var(--radius2);
      pointer-events:none;
      z-index: 0;

      /* IMPORTANT: step must match snap step (cell+gap) */
      background:
        repeating-linear-gradient(0deg,
          transparent 0,
          transparent calc(var(--step) - 1px),
          var(--gridLine) calc(var(--step) - 1px),
          var(--gridLine) var(--step)
        ),
        repeating-linear-gradient(90deg,
          transparent 0,
          transparent calc(var(--step) - 1px),
          var(--gridLine) calc(var(--step) - 1px),
          var(--gridLine) var(--step)
        ),
        radial-gradient(var(--gridDot) 1px, transparent 1px);
      background-size:
        var(--step) var(--step),
        var(--step) var(--step),
        18px 18px;

      opacity: 0;
      transition: opacity 220ms var(--ease);
      mask-image: radial-gradient(120% 120% at 50% 40%, #000 55%, transparent 100%);
    }

    .stage.edit-mode .grid-overlay{
      opacity: 0.38;
    }

    .widget-area{
      position:absolute;
      inset: var(--pad);
      border-radius: var(--radius2);
      z-index: 1;
    }

    /* =========================
       Widgets
       ========================= */
    .widget{
      position:absolute;
      border-radius: var(--radius);
      background: linear-gradient(180deg, var(--glass), var(--glass2));
      border: 1px solid var(--stroke);
      backdrop-filter: blur(16px) saturate(140%);
      -webkit-backdrop-filter: blur(16px) saturate(140%);
      overflow: visible;
      user-select:none;
      touch-action:none;
      transform: translate3d(0,0,0);
      will-change: transform, left, top;
      z-index: 2;
    }

    /* Shadow layer always below its widget (no shadow over other widgets) */
    .widget::before{
      content:"";
      position:absolute;
      inset:-10px;
      border-radius: calc(var(--radius) + 10px);
      z-index:-1;
      pointer-events:none;
      box-shadow:
        0 14px 40px rgba(0,0,0,0.28),
        0 4px 16px rgba(0,0,0,0.20);
      opacity: 0.95;
      filter: blur(0.2px);
    }
    html[data-theme="light"] .widget::before{
      box-shadow:
        0 14px 38px rgba(10,20,40,0.18),
        0 4px 14px rgba(10,20,40,0.12);
      opacity: 0.85;
    }

    /* Dragging only in edit mode */
    .widget.dragging{
      cursor: grabbing;
      z-index: 50;
    }

    /* Content helpers */
    .pad{
      padding: 14px;
    }

    .big-time{
      font-size: 34px;
      font-weight: 800;
      letter-spacing: 0.2px;
      line-height: 1.05;
    }

    .date-line{
      margin-top: 6px;
      font-size: 13px;
      color: var(--muted);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
    }

    .subline{
      margin-top: 10px;
      font-size: 12.5px;
      color: var(--muted);
      line-height: 1.25rem;
    }

    .dot{
      width:10px;height:10px;border-radius:999px;
      background: rgba(var(--accent),0.95);
      box-shadow: 0 0 0 6px rgba(var(--accent),0.12);
      flex:0 0 auto;
    }

    /* Ghost preview */
    .snap-ghost{
      position:absolute;
      border-radius: var(--radius);
      border: 1px dashed rgba(var(--accent),0.55);
      background: rgba(var(--accent),0.10);
      box-shadow: 0 0 0 8px rgba(var(--accent),0.06);
      pointer-events:none;
      z-index: 10;
      opacity: 0;
      transition: opacity 180ms var(--ease);
    }
    .snap-ghost.visible{ opacity: 1; }

    /* =========================
       Theme slider widget (no title)
       ========================= */
    .theme-widget{
      width: calc(var(--cell) * 2 + var(--gap));
      height: calc(var(--cell) * 1);
    }

    .theme-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .theme-label{
      font-size: 12px;
      color: var(--muted);
      display:flex;
      align-items:center;
      gap: 8px;
      min-width:0;
    }

    .theme-pill{
      position:relative;
      height: 44px;
      border-radius: 999px;
      border: 1px solid var(--stroke2);
      background: rgba(0,0,0,0.10);
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 6px;
      touch-action:none;
    }
    html[data-theme="light"] .theme-pill{ background: rgba(255,255,255,0.35); }

    .theme-options{
      position:relative;
      width: 100%;
      height: 100%;
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      align-items:center;
      z-index: 2;
    }

    .theme-opt{
      display:flex;
      align-items:center;
      justify-content:center;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
      user-select:none;
      cursor:pointer;
    }

    .ico{
      width: 18px;
      height: 18px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      opacity: 0.92;
    }

    .theme-thumb{
      position:absolute;
      top: 6px;
      bottom: 6px;
      width: calc((100% - 12px) / 3);
      left: 6px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255,255,255,0.28), rgba(255,255,255,0.14));
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.18),
        0 10px 24px rgba(0,0,0,0.18);
      backdrop-filter: blur(14px) saturate(140%);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
      transform: translateX(0);
      transition: transform 240ms var(--ease);
      z-index: 1;
      will-change: transform;
    }

    html[data-theme="light"] .theme-thumb{
      background: linear-gradient(180deg, rgba(255,255,255,0.70), rgba(255,255,255,0.35));
      border: 1px solid rgba(10,20,40,0.12);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.35),
        0 10px 20px rgba(10,20,40,0.12);
    }

    .theme-opt.active{
      color: var(--text);
    }

    /* =========================
       Clock widget (no title)
       ========================= */
    .clock-widget{
      width: calc(var(--cell) * 2 + var(--gap));
      height: calc(var(--cell) * 1);
    }

    /* =========================
       Chat widget (Jarvis)
       ========================= */
    .chat-widget{
      width: calc(var(--cell) * 3 + var(--gap) * 2);
      height: calc(var(--cell) * 1);
    }

    .chat-row{
      display:flex;
      align-items:center;
      gap: 10px;
      height: 100%;
    }

    .jarvis-badge{
      display:flex;
      align-items:center;
      gap: 10px;
      flex: 0 0 auto;
      padding-left: 2px;
    }

    .jarvis-text{
      font-weight: 820;
      letter-spacing: 0.6px;
      font-size: 13px;
      color: rgba(var(--accent),0.95);
    }

    .cmd{
      flex:1 1 auto;
      height: 44px;
      border-radius: 999px;
      border: 1px solid var(--stroke2);
      background: rgba(0,0,0,0.12);
      color: var(--text);
      padding: 0 14px;
      outline: none;
      font-size: 14px;
    }
    html[data-theme="light"] .cmd{ background: rgba(255,255,255,0.40); }

    .cmd:focus{
      box-shadow: 0 0 0 6px rgba(var(--accent),0.18);
      border-color: rgba(var(--accent),0.45);
    }

    .hint{
      flex:0 0 auto;
      font-size: 12px;
      color: var(--muted);
      white-space:nowrap;
      padding-right: 2px;
    }
  </style>
</head>

<body>
  <div class="stage" id="stage">
    <div class="grid-overlay" id="grid"></div>

    <div class="widget-area" id="area">
      <div class="snap-ghost" id="ghost"></div>

      <!-- Theme Slider Widget (no title/header) -->
      <div class="widget theme-widget" data-id="theme" data-kind="theme">
        <div class="pad">
          <div class="theme-top">
            <div class="theme-label"><span class="dot"></span><span>Theme</span></div>
            <div class="theme-label" id="themeStatus">Dark</div>
          </div>

          <div class="theme-pill" id="themePill">
            <div class="theme-thumb" id="themeThumb"></div>

            <div class="theme-options" id="themeOptions">
              <div class="theme-opt" data-theme="light" title="Light">
                <span class="ico">☀️</span>
              </div>
              <div class="theme-opt" data-theme="dark" title="Dark">
                <span class="ico">🌙</span>
              </div>
              <div class="theme-opt" data-theme="auto" title="Auto">
                <span class="ico">✨</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Clock Widget (no title/header) -->
      <div class="widget clock-widget" data-id="clock" data-kind="clock">
        <div class="pad">
          <div class="big-time" id="clock">--:--</div>
          <div class="date-line">
            <div id="dateLabel">—</div>
            <div style="color:var(--muted); font-size:12px;" id="secondsLabel"></div>
          </div>
          <div class="subline">Lisboa</div>
        </div>
      </div>

      <!-- Chat Widget (Jarvis) -->
      <div class="widget chat-widget" data-id="chat" data-kind="chat">
        <div class="pad" style="height:100%;">
          <div class="chat-row">
            <div class="jarvis-badge">
              <span class="dot"></span>
              <div class="jarvis-text">JARVIS</div>
            </div>
            <input class="cmd" id="cmd" autocomplete="off" spellcheck="false"
              placeholder='Digite um comando… (ex: "jarvis remove theme")'/>
            <div class="hint">Enter ↵</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // =========================================================
    // Core: Edit Mode + Grid only on edit + Drag/Drop + Snap + Anti-overlap
    // Theme slider: smooth continuous drag (rAF)
    // =========================================================

    const stage = document.getElementById('stage');
    const area  = document.getElementById('area');
    const ghost = document.getElementById('ghost');
    const cmd   = document.getElementById('cmd');

    const prefersDark = () => window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;

    // ---------- Helpers ----------
    const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

    function getVars(){
      const cs = getComputedStyle(document.documentElement);
      const cell = parseFloat(cs.getPropertyValue('--cell')) || 120;
      const gap  = parseFloat(cs.getPropertyValue('--gap'))  || 14;
      const pad  = parseFloat(cs.getPropertyValue('--pad'))  || 16;
      return { cell, gap, pad, step: cell + gap };
    }

    function areaRect(){
      return area.getBoundingClientRect();
    }

    // Keep CSS --step synced with JS step (so grid aligns perfectly)
    function syncStepVar(){
      const { step } = getVars();
      document.documentElement.style.setProperty('--step', step + 'px');
    }

    function snapPoint(absX, absY, w, h){
      const { step } = getVars();
      const r = areaRect();

      let rx = absX - r.left;
      let ry = absY - r.top;

      let sx = Math.round(rx / step) * step;
      let sy = Math.round(ry / step) * step;

      const minX = 0;
      const minY = 0;
      const maxX = r.width  - w;
      const maxY = r.height - h;

      sx = clamp(sx, minX, maxX);
      sy = clamp(sy, minY, maxY);

      return { left: sx, top: sy };
    }

    function setGhost(el, left, top){
      ghost.style.width  = el.offsetWidth + 'px';
      ghost.style.height = el.offsetHeight + 'px';
      ghost.style.left   = left + 'px';
      ghost.style.top    = top + 'px';
      ghost.classList.add('visible');
    }

    function hideGhost(){
      ghost.classList.remove('visible');
    }

    function rectsOverlap(a, b){
      return !(
        a.right <= b.left ||
        a.left >= b.right ||
        a.bottom <= b.top ||
        a.top >= b.bottom
      );
    }

    function widgetRectInArea(w, left, top){
      return {
        left,
        top,
        right: left + w.offsetWidth,
        bottom: top + w.offsetHeight
      };
    }

    function intersectsAny(w, testLeft, testTop){
      const test = widgetRectInArea(w, testLeft, testTop);
      for(const other of document.querySelectorAll('.widget')){
        if(other === w) continue;
        if(other.style.display === 'none') continue;
        const ol = parseFloat(other.style.left || 0);
        const ot = parseFloat(other.style.top  || 0);
        const orect = widgetRectInArea(other, ol, ot);
        if(rectsOverlap(test, orect)) return true;
      }
      return false;
    }

    // Find nearest free grid cell (anti-overlap)
    function findNearestFree(w, desiredLeft, desiredTop){
      const { step } = getVars();
      const r = areaRect();
      const maxCols = Math.max(1, Math.floor((r.width  - w.offsetWidth)  / step) + 1);
      const maxRows = Math.max(1, Math.floor((r.height - w.offsetHeight) / step) + 1);

      const startCol = clamp(Math.round(desiredLeft / step), 0, maxCols - 1);
      const startRow = clamp(Math.round(desiredTop  / step), 0, maxRows - 1);

      // Spiral search around desired cell
      const maxRadius = Math.max(maxCols, maxRows);
      for(let rad = 0; rad <= maxRadius; rad++){
        for(let dr = -rad; dr <= rad; dr++){
          for(let dc = -rad; dc <= rad; dc++){
            if(Math.abs(dc) !== rad && Math.abs(dr) !== rad) continue; // only perimeter
            const col = startCol + dc;
            const row = startRow + dr;
            if(col < 0 || row < 0 || col >= maxCols || row >= maxRows) continue;

            const left = col * step;
            const top  = row * step;

            if(!intersectsAny(w, left, top)){
              return { left, top };
            }
          }
        }
      }
      // fallback
      return { left: desiredLeft, top: desiredTop };
    }

    // ---------- Layout persistence ----------
    const STORAGE_KEY = 'jarvis.layout.v2'; // bumped due to structure changes
    const EDIT_KEY    = 'jarvis.editmode.v1';

    function loadLayout(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        if(!raw) return {};
        return JSON.parse(raw) || {};
      }catch(e){
        return {};
      }
    }

    function saveLayout(layout){
      try{
        localStorage.setItem(STORAGE_KEY, JSON.stringify(layout));
      }catch(e){}
    }

    function applyLayout(){
      const layout = loadLayout();
      document.querySelectorAll('.widget').forEach(w=>{
        const id = w.dataset.id;

        if(layout[id] && layout[id].hidden){
          w.style.display = 'none';
          return;
        } else {
          w.style.display = '';
        }

        if(layout[id] && typeof layout[id].left === 'number' && typeof layout[id].top === 'number'){
          w.style.left = layout[id].left + 'px';
          w.style.top  = layout[id].top  + 'px';
        }
      });
    }

    function commitWidgetPos(w, left, top){
      w.style.left = left + 'px';
      w.style.top  = top  + 'px';

      const layout = loadLayout();
      layout[w.dataset.id] = layout[w.dataset.id] || {};
      layout[w.dataset.id].left = left;
      layout[w.dataset.id].top  = top;
      layout[w.dataset.id].hidden = false;
      saveLayout(layout);
    }

    function hideWidget(id){
      const w = document.querySelector(`.widget[data-id="${id}"]`);
      if(!w) return false;
      w.style.display = 'none';
      const layout = loadLayout();
      layout[id] = layout[id] || {};
      layout[id].hidden = true;
      saveLayout(layout);
      return true;
    }

    // ---------- Default placement ----------
    function defaultLayoutIfNeeded(){
      const layout = loadLayout();
      if(Object.keys(layout).length) return;

      const widgets = {
        theme: document.querySelector('.widget[data-id="theme"]'),
        clock: document.querySelector('.widget[data-id="clock"]'),
        chat:  document.querySelector('.widget[data-id="chat"]'),
      };

      const { step } = getVars();
      const r = areaRect();

      const positions = {
        theme: { left: 0,       top: 0 },
        clock: { left: step*2,  top: 0 },
        chat:  { left: 0,       top: step*1 }
      };

      Object.entries(positions).forEach(([id,pos])=>{
        const w = widgets[id];
        if(!w) return;
        const snapped = snapPoint(r.left + pos.left, r.top + pos.top, w.offsetWidth, w.offsetHeight);
        const free = findNearestFree(w, snapped.left, snapped.top);
        commitWidgetPos(w, free.left, free.top);
      });
    }

    // ---------- Edit mode ----------
    let isEditMode = false;

    function setEditMode(on){
      isEditMode = !!on;
      stage.classList.toggle('edit-mode', isEditMode);
      try{ localStorage.setItem(EDIT_KEY, isEditMode ? '1' : '0'); }catch(e){}
    }

    function loadEditMode(){
      const v = localStorage.getItem(EDIT_KEY);
      setEditMode(v === '1');
    }

    // Enter/exit edit mode via hold
    const HOLD_MS = 450;
    let hold = null;

    function startHold(e, w){
      clearHold();
      hold = {
        pointerId: e.pointerId,
        startX: e.clientX,
        startY: e.clientY,
        w,
        timer: setTimeout(()=>{
          // toggle edit mode
          setEditMode(!isEditMode);
          clearHold(true);
        }, HOLD_MS)
      };
    }

    function clearHold(keepPointer){
      if(!hold) return;
      clearTimeout(hold.timer);
      if(!keepPointer){
        // nothing
      }
      hold = null;
    }

    // ---------- Drag & Drop (only in edit mode) ----------
    let drag = null;

    function canStartDragFromTarget(target){
      // Don't drag the widget if user is interacting with inputs/slider
      if(target.closest('#themePill')) return false;
      if(target.closest('input, textarea, button, select')) return false;
      return true;
    }

    function onPointerDown(e){
      const w = e.target.closest('.widget');
      if(!w) return;

      // Hold toggles edit mode
      startHold(e, w);

      // Only allow drag if currently in edit mode
      if(!isEditMode) return;

      if(!canStartDragFromTarget(e.target)) return;

      e.preventDefault();

      const r = areaRect();
      const wr = w.getBoundingClientRect();

      drag = {
        w,
        startX: e.clientX,
        startY: e.clientY,
        originLeft: parseFloat(w.style.left || (wr.left - r.left)),
        originTop:  parseFloat(w.style.top  || (wr.top  - r.top)),
        dx: 0,
        dy: 0,
        moved: false
      };

      w.classList.add('dragging');
      w.setPointerCapture(e.pointerId);
    }

    function onPointerMove(e){
      // cancel hold if moved
      if(hold){
        const md = Math.abs(e.clientX - hold.startX) + Math.abs(e.clientY - hold.startY);
        if(md > 6) clearHold();
      }

      if(!drag) return;

      const w = drag.w;
      drag.dx = e.clientX - drag.startX;
      drag.dy = e.clientY - drag.startY;

      if(Math.abs(drag.dx) + Math.abs(drag.dy) > 2) drag.moved = true;

      w.style.transform = `translate3d(${drag.dx}px, ${drag.dy}px, 0)`;

      const r = areaRect();
      const wr = w.getBoundingClientRect();
      const width = wr.width;
      const height = wr.height;

      const targetAbsX = (r.left + drag.originLeft) + drag.dx;
      const targetAbsY = (r.top  + drag.originTop ) + drag.dy;

      const snapped = snapPoint(targetAbsX, targetAbsY, width, height);
      setGhost(w, snapped.left, snapped.top);
    }

    function onPointerUp(e){
      clearHold();

      if(!drag) return;

      const w = drag.w;
      const r = areaRect();
      const wr = w.getBoundingClientRect();
      const width = wr.width;
      const height = wr.height;

      const targetAbsX = (r.left + drag.originLeft) + drag.dx;
      const targetAbsY = (r.top  + drag.originTop ) + drag.dy;

      const snapped = snapPoint(targetAbsX, targetAbsY, width, height);

      // Anti-overlap: find nearest free cell if occupied
      const finalPos = intersectsAny(w, snapped.left, snapped.top)
        ? findNearestFree(w, snapped.left, snapped.top)
        : snapped;

      w.style.transform = 'translate3d(0,0,0)';
      commitWidgetPos(w, finalPos.left, finalPos.top);

      w.classList.remove('dragging');
      hideGhost();
      drag = null;
    }

    // ---------- Theme slider ----------
    const themeThumb   = document.getElementById('themeThumb');
    const themeOptions = document.getElementById('themeOptions');
    const themeStatus  = document.getElementById('themeStatus');
    const themePill    = document.getElementById('themePill');

    const THEME_KEY = 'jarvis.theme.mode.v1';

    function setTheme(mode){
      localStorage.setItem(THEME_KEY, mode);

      let applied = mode;
      if(mode === 'auto'){
        applied = prefersDark() ? 'dark' : 'light';
      }
      document.documentElement.setAttribute('data-theme', applied);

      [...themeOptions.querySelectorAll('.theme-opt')].forEach(opt=>{
        opt.classList.toggle('active', opt.dataset.theme === mode);
      });

      const index = mode === 'light' ? 0 : (mode === 'dark' ? 1 : 2);
      themeThumb.style.transition = 'transform 240ms var(--ease)';
      themeThumb.style.transform = `translateX(${index * 100}%)`;
      themeStatus.textContent = mode[0].toUpperCase() + mode.slice(1);
    }

    function loadTheme(){
      const saved = localStorage.getItem(THEME_KEY) || 'dark';
      setTheme(saved);
    }

    // Click still works (kept)
    themeOptions.addEventListener('click', (e)=>{
      const opt = e.target.closest('.theme-opt');
      if(!opt) return;
      setTheme(opt.dataset.theme);
    });

    // Smooth drag (continuous, rAF)
    let pillDrag = null;
    let rafId = 0;

    function pillThumbFromX(x, rect){
      const innerLeft = 6;
      const innerRight = rect.width - 6;
      const t = clamp((x - innerLeft) / (innerRight - innerLeft), 0, 1);
      // thumb ranges over 0..2 slots, but continuous
      const px = t * 200; // 0%..200% (since 3 slots)
      return px;
    }

    function renderThumb(px){
      themeThumb.style.transition = 'none';
      themeThumb.style.transform = `translateX(${px}%)`;
    }

    themePill.addEventListener('pointerdown', (e)=>{
      // prevent page gestures
      e.preventDefault();
      const rect = themePill.getBoundingClientRect();
      pillDrag = { rect, lastX: e.clientX };

      themePill.setPointerCapture(e.pointerId);

      const px = pillThumbFromX(e.clientX - rect.left, rect);
      renderThumb(px);
    });

    themePill.addEventListener('pointermove', (e)=>{
      if(!pillDrag) return;
      pillDrag.lastX = e.clientX;

      if(rafId) return;
      rafId = requestAnimationFrame(()=>{
        rafId = 0;
        const rect = pillDrag.rect;
        const localX = pillDrag.lastX - rect.left;
        const px = pillThumbFromX(localX, rect);
        renderThumb(px);
      });
    });

    themePill.addEventListener('pointerup', (e)=>{
      if(!pillDrag) return;

      const rect = pillDrag.rect;
      const localX = e.clientX - rect.left;

      // decide slot at release
      const innerLeft = 6;
      const innerRight = rect.width - 6;
      const t = clamp((localX - innerLeft) / (innerRight - innerLeft), 0, 1);
      const idx = clamp(Math.round(t * 2), 0, 2);

      const mode = idx === 0 ? 'light' : (idx === 1 ? 'dark' : 'auto');
      pillDrag = null;

      setTheme(mode);
    });

    window.matchMedia('(prefers-color-scheme: dark)').addEventListener?.('change', ()=>{
      const saved = localStorage.getItem(THEME_KEY) || 'dark';
      if(saved === 'auto') setTheme('auto');
    });

    // ---------- Clock ----------
    const clockEl = document.getElementById('clock');
    const dateLabel = document.getElementById('dateLabel');
    const secondsLabel = document.getElementById('secondsLabel');

    function tick(){
      const now = new Date();
      const hh = String(now.getHours()).padStart(2,'0');
      const mm = String(now.getMinutes()).padStart(2,'0');
      const ss = String(now.getSeconds()).padStart(2,'0');

      clockEl.textContent = `${hh}:${mm}`;
      secondsLabel.textContent = ss;

      // "quinta, 26/02" style
      const weekday = new Intl.DateTimeFormat('pt-PT', { weekday:'long' }).format(now);
      const dd = String(now.getDate()).padStart(2,'0');
      const mo = String(now.getMonth()+1).padStart(2,'0');
      dateLabel.textContent = `${weekday}, ${dd}/${mo}`;
    }

    // ---------- Commands ----------
    function runCommand(raw){
      const input = raw.trim().toLowerCase();
      if(!input) return;

      // removals
      if(input.includes('remove theme') || input.includes('remover tema')){
        hideWidget('theme');
        return;
      }
      if(input.includes('remove chat') || input.includes('remover chat') || input.includes('remove jarvis')){
        hideWidget('chat');
        return;
      }

      // theme
      if(input.includes('theme ') || input.includes('tema ')){
        if(input.includes('dark') || input.includes('escuro')) return setTheme('dark');
        if(input.includes('light') || input.includes('claro')) return setTheme('light');
        if(input.includes('auto')) return setTheme('auto');
      }
    }

    cmd.addEventListener('keydown', (e)=>{
      if(e.key === 'Enter'){
        runCommand(cmd.value);
        cmd.value = '';
      }
    });

    // ---------- Boot ----------
    function resnapAllIntoGrid(){
      // Ensures alignment with the grid + resolves overlaps if any
      document.querySelectorAll('.widget').forEach(w=>{
        if(w.style.display === 'none') return;

        const left = parseFloat(w.style.left || 0);
        const top  = parseFloat(w.style.top  || 0);
        const r = areaRect();

        const snapped = snapPoint(r.left + left, r.top + top, w.offsetWidth, w.offsetHeight);
        const finalPos = intersectsAny(w, snapped.left, snapped.top)
          ? findNearestFree(w, snapped.left, snapped.top)
          : snapped;

        commitWidgetPos(w, finalPos.left, finalPos.top);
      });
    }

    function boot(){
      syncStepVar();
      loadTheme();
      loadEditMode();

      // Drag handlers
      area.addEventListener('pointerdown', onPointerDown);
      window.addEventListener('pointermove', onPointerMove);
      window.addEventListener('pointerup', onPointerUp);

      // Layout
      defaultLayoutIfNeeded();
      applyLayout();

      // Fix old layouts + alignment + overlap
      resnapAllIntoGrid();

      // Clock
      tick();
      setInterval(tick, 1000);

      // Re-sync grid step & re-snap on resize
      window.addEventListener('resize', ()=>{
        syncStepVar();
        resnapAllIntoGrid();
      });
    }

    boot();
  </script>
</body>
</html>
