<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <title>Jarvis Terminal</title>

  <style>
    /* =========================================================
       JARVIS TERMINAL — Premium Liquid Glass UI
       (Grid + Drag/Drop + Snap + Shadows layer fix + Theme Widget)
       ========================================================= */

    :root{
      --bg0: #06080f;
      --bg1: #0a1020;
      --glass: rgba(255,255,255,0.10);
      --glass2: rgba(255,255,255,0.14);
      --stroke: rgba(255,255,255,0.18);
      --stroke2: rgba(255,255,255,0.26);
      --text: rgba(255,255,255,0.92);
      --muted: rgba(255,255,255,0.62);

      --accent: 105, 199, 255;     /* RGB only */
      --danger: 255, 110, 110;

      --radius: 22px;
      --radius2: 28px;

      /* Grid */
      --cell: 120px;
      --gap: 14px;                 /* espaço entre widgets */
      --pad: 16px;                 /* padding do desktop */
      --gridLine: rgba(255,255,255,0.10);
      --gridDot: rgba(255,255,255,0.09);

      /* Motion */
      --ease: cubic-bezier(.2,.9,.2,1);
    }

    html[data-theme="light"]{
      --bg0: #f5f7ff;
      --bg1: #dfe7ff;
      --glass: rgba(255,255,255,0.62);
      --glass2: rgba(255,255,255,0.52);
      --stroke: rgba(10,20,40,0.10);
      --stroke2: rgba(10,20,40,0.16);
      --text: rgba(10,18,34,0.90);
      --muted: rgba(10,18,34,0.56);
      --gridLine: rgba(10,20,40,0.10);
      --gridDot: rgba(10,20,40,0.09);
    }

    /* Mobile tuning */
    @media (max-width: 640px){
      :root{
        --cell: 104px;
        --gap: 12px;
        --pad: 12px;
        --radius: 20px;
        --radius2: 26px;
      }
    }

    *{ box-sizing:border-box; }
    html, body{
      width:100%;
      height:100%;
      margin:0;
      padding:0;
      overflow:hidden; /* terminal full screen */
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      color: var(--text);
      background:
        radial-gradient(1200px 900px at 20% 10%, rgba(var(--accent),0.18), transparent 55%),
        radial-gradient(900px 900px at 80% 40%, rgba(140,120,255,0.16), transparent 55%),
        linear-gradient(160deg, var(--bg0), var(--bg1));
    }

    /* Subtle “liquid glass” noise (CSS only) */
    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(1px 1px at 20px 30px, rgba(255,255,255,0.05), transparent 50%),
        radial-gradient(1px 1px at 70px 90px, rgba(255,255,255,0.04), transparent 50%),
        radial-gradient(1px 1px at 140px 60px, rgba(255,255,255,0.04), transparent 50%);
      background-size: 220px 220px;
      mix-blend-mode: overlay;
      opacity: 0.55;
      filter: blur(0.2px);
    }

    /* =========================
       Stage
       ========================= */
    .stage{
      position:relative;
      width:100%;
      height:100%;
      padding: var(--pad);
      padding-bottom: calc(var(--pad) + 78px); /* espaço do command bar */
      isolation:isolate; /* stacking context geral */
    }

    /* Grid overlay — visível em ambos os temas */
    .grid-overlay{
      position:absolute;
      inset: var(--pad);
      bottom: calc(var(--pad) + 78px);
      border-radius: var(--radius2);
      pointer-events:none;
      z-index: 0;

      /* Linhas + pontos (não exagerado) */
      background:
        repeating-linear-gradient(0deg,
          transparent 0,
          transparent calc(var(--cell) - 1px),
          var(--gridLine) calc(var(--cell) - 1px),
          var(--gridLine) var(--cell)
        ),
        repeating-linear-gradient(90deg,
          transparent 0,
          transparent calc(var(--cell) - 1px),
          var(--gridLine) calc(var(--cell) - 1px),
          var(--gridLine) var(--cell)
        ),
        radial-gradient(var(--gridDot) 1px, transparent 1px);
      background-size:
        var(--cell) var(--cell),
        var(--cell) var(--cell),
        18px 18px;
      opacity: 0.38;
      mask-image: radial-gradient(120% 120% at 50% 40%, #000 55%, transparent 100%);
    }

    /* Area onde widgets vivem */
    .widget-area{
      position:absolute;
      inset: var(--pad);
      bottom: calc(var(--pad) + 78px);
      border-radius: var(--radius2);
      z-index: 1;
    }

    /* =========================
       Widgets — base
       ========================= */
    .widget{
      position:absolute;
      border-radius: var(--radius);
      background: linear-gradient(180deg, var(--glass), var(--glass2));
      border: 1px solid var(--stroke);
      backdrop-filter: blur(16px) saturate(140%);
      -webkit-backdrop-filter: blur(16px) saturate(140%);
      overflow: visible; /* importante p/ shadow layer */
      user-select:none;
      touch-action:none; /* pointer events smooth */
      transform: translate3d(0,0,0);
      will-change: transform, left, top;
      z-index: 2;
    }

    /* Sombra em layer abaixo — NÃO sobrepõe outros widgets ✅ */
    .widget::before{
      content:"";
      position:absolute;
      inset:-10px;
      border-radius: calc(var(--radius) + 10px);
      z-index:-1;
      pointer-events:none;
      /* sombra mais “premium” */
      box-shadow:
        0 14px 40px rgba(0,0,0,0.28),
        0 4px 16px rgba(0,0,0,0.20);
      opacity: 0.95;
      filter: blur(0.2px);
    }

    html[data-theme="light"] .widget::before{
      box-shadow:
        0 14px 38px rgba(10,20,40,0.18),
        0 4px 14px rgba(10,20,40,0.12);
      opacity: 0.85;
    }

    /* Drag states */
    .widget.dragging{
      cursor: grabbing;
      z-index: 50; /* sobe o widget, sombra ainda fica “atrás” por ser ::before com z-index -1 */
    }

    .widget .header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding: 12px 14px 10px 14px;
      gap: 10px;
    }

    .title{
      display:flex;
      align-items:center;
      gap: 10px;
      min-width:0;
    }

    .dot{
      width:10px;height:10px;border-radius:999px;
      background: rgba(var(--accent),0.95);
      box-shadow: 0 0 0 6px rgba(var(--accent),0.12);
      flex:0 0 auto;
    }

    .name{
      font-weight: 650;
      letter-spacing: 0.2px;
      font-size: 13.5px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      color: var(--text);
    }

    .sub{
      font-size: 12px;
      color: var(--muted);
      padding: 0 14px 14px 14px;
      line-height: 1.25rem;
    }

    /* “Ghost” de snap (preview do drop) */
    .snap-ghost{
      position:absolute;
      border-radius: var(--radius);
      border: 1px dashed rgba(var(--accent),0.55);
      background: rgba(var(--accent),0.10);
      box-shadow: 0 0 0 8px rgba(var(--accent),0.06);
      pointer-events:none;
      z-index: 10;
      opacity: 0;
      transition: opacity 180ms var(--ease);
    }
    .snap-ghost.visible{ opacity: 1; }

    /* =========================
       Command Bar
       ========================= */
    .command-bar{
      position:absolute;
      left: var(--pad);
      right: var(--pad);
      bottom: var(--pad);
      height: 62px;
      border-radius: 999px;
      background: linear-gradient(180deg, var(--glass), var(--glass2));
      border: 1px solid var(--stroke);
      backdrop-filter: blur(18px) saturate(140%);
      -webkit-backdrop-filter: blur(18px) saturate(140%);
      display:flex;
      align-items:center;
      gap: 10px;
      padding: 10px 14px;
      z-index: 100;
    }
    .prompt{
      font-weight: 750;
      letter-spacing: 0.4px;
      color: rgba(var(--accent),0.95);
      padding-left: 4px;
      flex:0 0 auto;
      font-size: 13px;
    }
    .cmd{
      flex:1 1 auto;
      height: 42px;
      border-radius: 999px;
      border: 1px solid var(--stroke2);
      background: rgba(0,0,0,0.12);
      color: var(--text);
      padding: 0 14px;
      outline: none;
      font-size: 14px;
    }
    html[data-theme="light"] .cmd{ background: rgba(255,255,255,0.40); }
    .hint{
      flex:0 0 auto;
      font-size: 12px;
      color: var(--muted);
      padding-right: 6px;
      white-space:nowrap;
    }

    /* =========================
       Theme Slider Widget (draggable)
       ========================= */
    .theme-widget{
      width: calc(var(--cell) * 2 + var(--gap));
      height: calc(var(--cell) * 1);
      padding-bottom: 8px;
    }

    .theme-body{
      padding: 0 14px 14px 14px;
      display:flex;
      flex-direction:column;
      gap: 10px;
    }

    .theme-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
    }

    .theme-label{
      font-size: 12px;
      color: var(--muted);
    }

    .theme-pill{
      position:relative;
      height: 44px;
      border-radius: 999px;
      border: 1px solid var(--stroke2);
      background: rgba(0,0,0,0.10);
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center; /* mantém tudo central */
      padding: 6px;
      touch-action:none;
    }
    html[data-theme="light"] .theme-pill{ background: rgba(255,255,255,0.35); }

    .theme-options{
      position:relative;
      width: 100%;
      height: 100%;
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      align-items:center;
      z-index: 2;
    }

    .theme-opt{
      display:flex;
      align-items:center;
      justify-content:center;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
      user-select:none;
      cursor:pointer;
    }

    .ico{
      width: 18px;
      height: 18px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      opacity: 0.92;
    }

    /* “Thumb” (pill interno) centralizado e suave */
    .theme-thumb{
      position:absolute;
      top: 6px;
      bottom: 6px;
      width: calc((100% - 12px) / 3);
      left: 6px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255,255,255,0.28), rgba(255,255,255,0.14));
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.18),
        0 10px 24px rgba(0,0,0,0.18);
      backdrop-filter: blur(14px) saturate(140%);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
      transform: translateX(0);
      transition: transform 240ms var(--ease);
      z-index: 1;
    }

    html[data-theme="light"] .theme-thumb{
      background: linear-gradient(180deg, rgba(255,255,255,0.70), rgba(255,255,255,0.35));
      border: 1px solid rgba(10,20,40,0.12);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.35),
        0 10px 20px rgba(10,20,40,0.12);
    }

    .theme-opt.active{
      color: var(--text);
    }

    /* Small widgets */
    .clock-widget{
      width: calc(var(--cell) * 2 + var(--gap));
      height: calc(var(--cell) * 1);
    }
    .info-widget{
      width: calc(var(--cell) * 1);
      height: calc(var(--cell) * 1);
    }

    .big{
      font-size: 30px;
      font-weight: 780;
      letter-spacing: 0.2px;
      padding: 0 14px 14px 14px;
    }

    /* Accessibility focus */
    .cmd:focus{
      box-shadow: 0 0 0 6px rgba(var(--accent),0.18);
      border-color: rgba(var(--accent),0.45);
    }
  </style>
</head>

<body>
  <div class="stage" id="stage">
    <div class="grid-overlay" id="grid"></div>

    <div class="widget-area" id="area">
      <!-- Ghost preview -->
      <div class="snap-ghost" id="ghost"></div>

      <!-- Theme Slider Widget (draggable) -->
      <div class="widget theme-widget" data-id="theme" data-kind="theme">
        <div class="header">
          <div class="title">
            <span class="dot"></span>
            <div class="name">Tema</div>
          </div>
          <div class="name" style="font-weight:700; font-size:12px; color:var(--muted);">Widget</div>
        </div>

        <div class="theme-body">
          <div class="theme-row">
            <div class="theme-label">Light · Dark · Auto</div>
            <div class="theme-label" id="themeStatus">Dark</div>
          </div>

          <div class="theme-pill" id="themePill">
            <div class="theme-thumb" id="themeThumb"></div>

            <div class="theme-options" id="themeOptions">
              <div class="theme-opt" data-theme="light" title="Light">
                <span class="ico">☀️</span>
              </div>
              <div class="theme-opt" data-theme="dark" title="Dark">
                <span class="ico">🌙</span>
              </div>
              <div class="theme-opt" data-theme="auto" title="Auto">
                <span class="ico">✨</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Clock -->
      <div class="widget clock-widget" data-id="clock" data-kind="clock">
        <div class="header">
          <div class="title">
            <span class="dot"></span>
            <div class="name">Relógio</div>
          </div>
          <div class="name" style="font-weight:700; font-size:12px; color:var(--muted);" id="dateLabel">—</div>
        </div>
        <div class="big" id="clock">--:--</div>
        <div class="sub">Lisboa · Terminal full screen · snap no grid ✨</div>
      </div>

      <!-- Small info widgets -->
      <div class="widget info-widget" data-id="sys" data-kind="info">
        <div class="header">
          <div class="title">
            <span class="dot"></span>
            <div class="name">Status</div>
          </div>
        </div>
        <div class="sub" id="sysText">Grid ✓<br/>Drag ✓<br/>Snap ✓</div>
      </div>

      <div class="widget info-widget" data-id="tips" data-kind="info">
        <div class="header">
          <div class="title">
            <span class="dot"></span>
            <div class="name">Dica</div>
          </div>
        </div>
        <div class="sub">Arraste widgets 👆<br/>Solte para snap.<br/>Comando: <b>jarvis remove theme</b></div>
      </div>
    </div>

    <div class="command-bar">
      <div class="prompt">JARVIS</div>
      <input class="cmd" id="cmd" autocomplete="off" spellcheck="false" placeholder='Digite um comando… (ex: "jarvis remove theme")'/>
      <div class="hint">Enter ↵</div>
    </div>
  </div>

  <script>
    // =========================================================
    // Core: Grid + Drag/Drop + Snap + Shadow layering + Theme slider
    // =========================================================

    const stage = document.getElementById('stage');
    const area  = document.getElementById('area');
    const ghost = document.getElementById('ghost');
    const cmd   = document.getElementById('cmd');

    const prefersDark = () => window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;

    // ---------- Helpers ----------
    const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

    function getVars(){
      const cs = getComputedStyle(document.documentElement);
      return {
        cell: parseFloat(cs.getPropertyValue('--cell')) || 120,
        gap:  parseFloat(cs.getPropertyValue('--gap'))  || 14,
        pad:  parseFloat(cs.getPropertyValue('--pad'))  || 16
      };
    }

    function areaRect(){
      return area.getBoundingClientRect();
    }

    function snapPoint(x, y, w, h){
      const { cell, gap } = getVars();
      const r = areaRect();

      // Conversão: coords relativas à área
      let rx = x - r.left;
      let ry = y - r.top;

      // Snap com “passo” = cell + gap
      const step = cell + gap;

      // Posiciona para o “canto” do grid
      let sx = Math.round(rx / step) * step;
      let sy = Math.round(ry / step) * step;

      // Mantém gutter (gap mínimo) sem grudar nas bordas
      const minX = 0;
      const minY = 0;
      const maxX = r.width  - w;
      const maxY = r.height - h;

      sx = clamp(sx, minX, maxX);
      sy = clamp(sy, minY, maxY);

      // Volta para coords absolutas
      return { left: sx, top: sy };
    }

    function setGhost(el, left, top){
      ghost.style.width  = el.offsetWidth + 'px';
      ghost.style.height = el.offsetHeight + 'px';
      ghost.style.left   = left + 'px';
      ghost.style.top    = top + 'px';
      ghost.classList.add('visible');
    }

    function hideGhost(){
      ghost.classList.remove('visible');
    }

    // ---------- Layout persistence ----------
    const STORAGE_KEY = 'jarvis.layout.v1';

    function loadLayout(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        if(!raw) return {};
        return JSON.parse(raw) || {};
      }catch(e){
        return {};
      }
    }

    function saveLayout(layout){
      try{
        localStorage.setItem(STORAGE_KEY, JSON.stringify(layout));
      }catch(e){}
    }

    function applyLayout(){
      const layout = loadLayout();

      document.querySelectorAll('.widget').forEach(w=>{
        const id = w.dataset.id;
        if(layout[id] && layout[id].hidden){
          w.style.display = 'none';
          return;
        }
        if(layout[id] && typeof layout[id].left === 'number' && typeof layout[id].top === 'number'){
          w.style.left = layout[id].left + 'px';
          w.style.top  = layout[id].top  + 'px';
        }
      });
    }

    function commitWidgetPos(w, left, top){
      w.style.left = left + 'px';
      w.style.top  = top  + 'px';

      const layout = loadLayout();
      layout[w.dataset.id] = layout[w.dataset.id] || {};
      layout[w.dataset.id].left = left;
      layout[w.dataset.id].top  = top;
      layout[w.dataset.id].hidden = false;
      saveLayout(layout);
    }

    function hideWidget(id){
      const w = document.querySelector(`.widget[data-id="${id}"]`);
      if(!w) return false;
      w.style.display = 'none';
      const layout = loadLayout();
      layout[id] = layout[id] || {};
      layout[id].hidden = true;
      saveLayout(layout);
      return true;
    }

    // ---------- Initial placement (only if no saved layout) ----------
    function defaultLayoutIfNeeded(){
      const layout = loadLayout();
      const hasAny = Object.keys(layout).length > 0;
      if(hasAny) return;

      const widgets = {
        theme: document.querySelector('.widget[data-id="theme"]'),
        clock: document.querySelector('.widget[data-id="clock"]'),
        sys:   document.querySelector('.widget[data-id="sys"]'),
        tips:  document.querySelector('.widget[data-id="tips"]'),
      };

      // Place neatly on grid
      // (0,0) theme, (2,0) clock, (0,1) sys, (1,1) tips
      const r = areaRect();
      const { cell, gap } = getVars();
      const step = cell + gap;

      const positions = {
        theme: { left: 0, top: 0 },
        clock: { left: step * 2, top: 0 },
        sys:   { left: 0, top: step * 1 },
        tips:  { left: step * 1, top: step * 1 },
      };

      Object.entries(positions).forEach(([id,pos])=>{
        const w = widgets[id];
        if(!w) return;
        const p = snapPoint(r.left + pos.left, r.top + pos.top, w.offsetWidth, w.offsetHeight);
        commitWidgetPos(w, p.left, p.top);
      });
    }

    // ---------- Drag & Drop ----------
    let drag = null;

    function onPointerDown(e){
      const w = e.target.closest('.widget');
      if(!w) return;

      // Se o pointer down foi dentro do theme pill, não iniciar drag do widget (para permitir slider)
      const isThemePill = e.target.closest('#themePill');
      if(isThemePill) return;

      e.preventDefault();

      const r = areaRect();
      const wr = w.getBoundingClientRect();

      drag = {
        w,
        startX: e.clientX,
        startY: e.clientY,
        originLeft: parseFloat(w.style.left || (wr.left - r.left)),
        originTop:  parseFloat(w.style.top  || (wr.top  - r.top)),
        dx: 0,
        dy: 0,
        moved: false
      };

      w.classList.add('dragging');
      w.setPointerCapture(e.pointerId);
    }

    function onPointerMove(e){
      if(!drag) return;

      const w = drag.w;
      drag.dx = e.clientX - drag.startX;
      drag.dy = e.clientY - drag.startY;

      if(Math.abs(drag.dx) + Math.abs(drag.dy) > 2) drag.moved = true;

      // Move via transform para performance, sem commit
      w.style.transform = `translate3d(${drag.dx}px, ${drag.dy}px, 0)`;

      // Ghost snap preview
      const r = areaRect();
      const wr = w.getBoundingClientRect();
      const width = wr.width;
      const height = wr.height;

      // Posição alvo considerando origem + delta
      const targetAbsX = (r.left + drag.originLeft) + drag.dx;
      const targetAbsY = (r.top  + drag.originTop ) + drag.dy;

      const snapped = snapPoint(targetAbsX, targetAbsY, width, height);
      setGhost(w, snapped.left, snapped.top);
    }

    function onPointerUp(e){
      if(!drag) return;

      const w = drag.w;

      // Finaliza
      const r = areaRect();
      const wr = w.getBoundingClientRect();
      const width = wr.width;
      const height = wr.height;

      const targetAbsX = (r.left + drag.originLeft) + drag.dx;
      const targetAbsY = (r.top  + drag.originTop ) + drag.dy;

      const snapped = snapPoint(targetAbsX, targetAbsY, width, height);

      // Commit do drop (resolve “voltar pra onde estava”)
      w.style.transform = 'translate3d(0,0,0)';
      commitWidgetPos(w, snapped.left, snapped.top);

      w.classList.remove('dragging');
      hideGhost();
      drag = null;
    }

    // ---------- Theme slider ----------
    const themeThumb   = document.getElementById('themeThumb');
    const themeOptions = document.getElementById('themeOptions');
    const themeStatus  = document.getElementById('themeStatus');
    const themePill    = document.getElementById('themePill');

    const THEME_KEY = 'jarvis.theme.mode.v1';

    function setTheme(mode){
      // mode: light | dark | auto
      localStorage.setItem(THEME_KEY, mode);

      let applied = mode;
      if(mode === 'auto'){
        applied = prefersDark() ? 'dark' : 'light';
      }
      document.documentElement.setAttribute('data-theme', applied);

      // UI
      [...themeOptions.querySelectorAll('.theme-opt')].forEach((opt, idx)=>{
        opt.classList.toggle('active', opt.dataset.theme === mode);
      });

      const index = mode === 'light' ? 0 : (mode === 'dark' ? 1 : 2);
      themeThumb.style.transform = `translateX(${index * 100}%)`;
      themeStatus.textContent = mode[0].toUpperCase() + mode.slice(1);
    }

    function loadTheme(){
      const saved = localStorage.getItem(THEME_KEY) || 'dark';
      setTheme(saved);
    }

    // Click to set theme
    themeOptions.addEventListener('click', (e)=>{
      const opt = e.target.closest('.theme-opt');
      if(!opt) return;
      setTheme(opt.dataset.theme);
    });

    // Drag inside pill to set theme (smooth)
    let pillDrag = null;
    themePill.addEventListener('pointerdown', (e)=>{
      // impedir iniciar drag do widget (já tratado acima), aqui é slider drag
      e.preventDefault();
      const rect = themePill.getBoundingClientRect();
      pillDrag = { startX: e.clientX, rect };
      themePill.setPointerCapture(e.pointerId);
    });

    themePill.addEventListener('pointermove', (e)=>{
      if(!pillDrag) return;
      const rect = pillDrag.rect;
      const x = clamp(e.clientX - rect.left, 0, rect.width);
      const t = x / rect.width; // 0..1
      // 3 slots
      const idx = clamp(Math.round(t * 2), 0, 2);
      themeThumb.style.transition = 'none';
      themeThumb.style.transform = `translateX(${idx * 100}%)`;
    });

    themePill.addEventListener('pointerup', (e)=>{
      if(!pillDrag) return;
      const rect = pillDrag.rect;
      const x = clamp(e.clientX - rect.left, 0, rect.width);
      const t = x / rect.width;
      const idx = clamp(Math.round(t * 2), 0, 2);
      const mode = idx === 0 ? 'light' : (idx === 1 ? 'dark' : 'auto');
      themeThumb.style.transition = ''; // volta transição
      setTheme(mode);
      pillDrag = null;
    });

    // Se o sistema mudar e estiver em auto, re-aplica
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener?.('change', ()=>{
      const saved = localStorage.getItem(THEME_KEY) || 'dark';
      if(saved === 'auto') setTheme('auto');
    });

    // ---------- Clock ----------
    const clockEl = document.getElementById('clock');
    const dateLabel = document.getElementById('dateLabel');

    function tick(){
      const now = new Date();
      const hh = String(now.getHours()).padStart(2,'0');
      const mm = String(now.getMinutes()).padStart(2,'0');
      clockEl.textContent = `${hh}:${mm}`;

      const fmt = new Intl.DateTimeFormat('pt-PT', { weekday:'short', day:'2-digit', month:'short' });
      dateLabel.textContent = fmt.format(now).replace('.', '');
    }

    // ---------- Commands ----------
    function runCommand(raw){
      const input = raw.trim().toLowerCase();

      // exemplos aceitos
      // jarvis remove theme
      // remove theme
      // jarvis theme dark
      if(!input) return;

      const say = (msg)=>{
        const sys = document.getElementById('sysText');
        sys.innerHTML = msg;
      };

      if(input.includes('remove theme') || input === 'remove tema' || input.includes('remover tema')){
        const ok = hideWidget('theme');
        say(ok ? '✅ Theme widget removido.<br/>Dica: recarregue para ver persistência.' : '⚠️ Não achei o widget theme.');
        return;
      }

      if(input.includes('theme ') || input.includes('tema ')){
        if(input.includes('dark') || input.includes('escuro')){
          setTheme('dark'); say('🌙 Tema: Dark');
          return;
        }
        if(input.includes('light') || input.includes('claro')){
          setTheme('light'); say('☀️ Tema: Light');
          return;
        }
        if(input.includes('auto')){
          setTheme('auto'); say('✨ Tema: Auto');
          return;
        }
      }

      say('🤖 Comando não reconhecido.<br/>Tente: <b>jarvis remove theme</b> · <b>jarvis theme dark</b>');
    }

    cmd.addEventListener('keydown', (e)=>{
      if(e.key === 'Enter'){
        runCommand(cmd.value);
        cmd.value = '';
      }
    });

    // ---------- Boot ----------
    function boot(){
      loadTheme();

      // Drag handlers
      area.addEventListener('pointerdown', onPointerDown);
      window.addEventListener('pointermove', onPointerMove);
      window.addEventListener('pointerup', onPointerUp);

      // Layout
      defaultLayoutIfNeeded();
      applyLayout();

      // Clock
      tick();
      setInterval(tick, 1000);

      // Re-snap on resize (mantém dentro do container)
      window.addEventListener('resize', ()=>{
        document.querySelectorAll('.widget').forEach(w=>{
          if(w.style.display === 'none') return;
          const left = parseFloat(w.style.left || 0);
          const top  = parseFloat(w.style.top  || 0);
          const r = areaRect();
          const snapped = snapPoint(r.left + left, r.top + top, w.offsetWidth, w.offsetHeight);
          commitWidgetPos(w, snapped.left, snapped.top);
        });
      });
    }

    boot();
  </script>
</body>
</html>
