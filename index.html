<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <title>Terminal</title>

  <style>
    :root{
      --bg0: #06080f;
      --bg1: #0a1020;

      --glass: rgba(255,255,255,0.10);
      --glass2: rgba(255,255,255,0.14);
      --stroke: rgba(255,255,255,0.18);
      --stroke2: rgba(255,255,255,0.26);

      --text: rgba(255,255,255,0.92);
      --muted: rgba(255,255,255,0.62);

      --accent: 105, 199, 255;

      --radius: 22px;
      --radius2: 28px;

      /* Grid system */
      --cell: 120px;
      --gap: 14px;
      --pad: 16px;
      --step: 134px; /* JS sync = cell+gap */
      --subStep: 67px; /* JS sync = step/2 */
      --subGap: 7px;   /* JS sync = gap/2 */

      /* Border thickness compensation */
      --b: 1px;

      /* ✅ seam fix (default none on dark) */
      --seamFix: 0px;

      /* Grid dots */
      --gridDot: rgba(255,255,255,0.14);
      --gridMajorDot: rgba(255,255,255,0.22);
      --microStep: 33.5px; /* JS sync = step/4 */

      --ease: cubic-bezier(.2,.9,.2,1);
    }

    html[data-theme="light"]{
      --bg0: #f5f7ff;
      --bg1: #dfe7ff;

      --glass: rgba(255,255,255,0.62);
      --glass2: rgba(255,255,255,0.52);
      --stroke: rgba(10,20,40,0.10);
      --stroke2: rgba(10,20,40,0.16);

      --text: rgba(10,18,34,0.90);
      --muted: rgba(10,18,34,0.56);

      --gridDot: rgba(10,20,40,0.14);
      --gridMajorDot: rgba(10,20,40,0.22);

      /* ✅ seam fix only in light */
      --seamFix: 2px;
    }

    @media (max-width: 640px){
      :root{
        --cell: 104px;
        --gap: 12px;
        --pad: 12px;
        --radius: 20px;
        --radius2: 26px;
      }
      html[data-theme="light"]{
        --seamFix: 2px;
      }
    }

    *{ box-sizing:border-box; }
    html, body{
      width:100%;
      height:100%;
      margin:0;
      padding:0;
      overflow:hidden;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      color: var(--text);
      background:
        radial-gradient(1200px 900px at 20% 10%, rgba(var(--accent),0.18), transparent 55%),
        radial-gradient(900px 900px at 80% 40%, rgba(140,120,255,0.16), transparent 55%),
        linear-gradient(160deg, var(--bg0), var(--bg1));
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(1px 1px at 20px 30px, rgba(255,255,255,0.05), transparent 50%),
        radial-gradient(1px 1px at 70px 90px, rgba(255,255,255,0.04), transparent 50%),
        radial-gradient(1px 1px at 140px 60px, rgba(255,255,255,0.04), transparent 50%);
      background-size: 220px 220px;
      mix-blend-mode: overlay;
      opacity: 0.55;
      filter: blur(0.2px);
    }

    .stage{
      position:relative;
      width:100%;
      height:100%;
      padding: var(--pad);
      isolation:isolate;
    }

    /* ✅ Gate: trava tudo por baixo até escolher login/convidado */
    body.auth-locked .stage{
      pointer-events:none;
      user-select:none;
    }

    .grid-overlay{
      position:absolute;
      inset: var(--pad);
      border-radius: var(--radius2);
      pointer-events:none;
      z-index: 0;

      background:
        radial-gradient(var(--gridDot) 1px, transparent 1px),
        radial-gradient(var(--gridMajorDot) 1.7px, transparent 1.7px);
      background-size:
        var(--microStep) var(--microStep),
        var(--step) var(--step);
      background-position: 0 0, 0 0;

      opacity: 0;
      transition: opacity 220ms var(--ease);
      mask-image: radial-gradient(120% 120% at 50% 40%, #000 58%, transparent 100%);
    }
    .stage.edit-mode .grid-overlay{ opacity: 0.70; }

    .widget-area{
      position:absolute;
      inset: var(--pad);
      border-radius: var(--radius2);
      z-index: 1;
    }

    .widget{
      position:absolute;
      border-radius: var(--radius);
      background: linear-gradient(180deg, var(--glass), var(--glass2));
      border: var(--b) solid var(--stroke);
      backdrop-filter: blur(16px) saturate(140%);
      -webkit-backdrop-filter: blur(16px) saturate(140%);
      overflow: visible;
      user-select:none;
      touch-action:none;
      transform: translate3d(0,0,0);
      will-change: transform, left, top, width, height;
      z-index: 2;
      transition: transform 220ms var(--ease), filter 220ms var(--ease);
    }

    .widget::before{
      content:"";
      position:absolute;
      inset:-10px;
      border-radius: calc(var(--radius) + 10px);
      z-index:-1;
      pointer-events:none;
      box-shadow:
        0 14px 40px rgba(0,0,0,0.28),
        0 4px 16px rgba(0,0,0,0.20);
      opacity: 0.95;
      filter: blur(0.2px);
      transition: box-shadow 240ms var(--ease), opacity 240ms var(--ease);
    }
    html[data-theme="light"] .widget::before{
      box-shadow:
        0 14px 38px rgba(10,20,40,0.18),
        0 4px 14px rgba(10,20,40,0.12);
      opacity: 0.85;
    }

    .widget.dragging{ cursor: grabbing; z-index: 50; }
    .widget.resizing{ z-index: 55; }

    @keyframes floaty {
      0%, 100% { transform: translate3d(0,0,0); }
      50%      { transform: translate3d(0,-4px,0); }
    }
    .stage.edit-mode .widget:not(.dragging):not(.resizing){
      animation: floaty 2.8s ease-in-out infinite;
      filter: saturate(1.02);
    }
    .stage.edit-mode .widget:not(.dragging):not(.resizing)::before{
      box-shadow:
        0 18px 46px rgba(0,0,0,0.34),
        0 6px 18px rgba(0,0,0,0.22);
      opacity: 0.98;
    }
    html[data-theme="light"] .stage.edit-mode .widget:not(.dragging):not(.resizing)::before{
      box-shadow:
        0 18px 40px rgba(10,20,40,0.22),
        0 6px 16px rgba(10,20,40,0.14);
      opacity: 0.92;
    }

    .pad{ padding: 14px; }

    .snap-ghost{
      position:absolute;
      border-radius: var(--radius);
      border: 1px dashed rgba(var(--accent),0.55);
      background: rgba(var(--accent),0.10);
      box-shadow: 0 0 0 8px rgba(var(--accent),0.06);
      pointer-events:none;
      z-index: 10;
      opacity: 0;
      transition: opacity 180ms var(--ease);
    }
    .snap-ghost.visible{ opacity: 1; }

    /* ====== Resize Handle (Edit Mode) ====== */
    .resize-handle{
      position:absolute;
      right: 10px;
      bottom: 10px;
      width: 26px;
      height: 26px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(0,0,0,0.10);
      backdrop-filter: blur(10px) saturate(140%);
      -webkit-backdrop-filter: blur(10px) saturate(140%);
      display:none;
      align-items:center;
      justify-content:center;
      cursor: nwse-resize;
      user-select:none;
      z-index: 5;
    }
    html[data-theme="light"] .resize-handle{
      border: 1px solid rgba(10,20,40,0.12);
      background: rgba(255,255,255,0.35);
    }
    .resize-handle::before{
      content:"";
      width: 12px;
      height: 12px;
      border-right: 2px solid rgba(255,255,255,0.55);
      border-bottom: 2px solid rgba(255,255,255,0.55);
      transform: translate(1px,1px);
      border-radius: 1px;
      opacity: 0.9;
    }
    html[data-theme="light"] .resize-handle::before{
      border-right: 2px solid rgba(10,20,40,0.45);
      border-bottom: 2px solid rgba(10,20,40,0.45);
    }

    .stage.edit-mode .widget[data-resizable="1"] .resize-handle{
      display:flex;
    }

    /* ====== Clock content (auto scale) ====== */
    .clock-widget{
      --clockScale: 1;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
    }
    .clock-inner{
      width:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap: calc(6px * var(--clockScale));
      text-align:center;
    }
    .time-row{
      display:flex;
      align-items:baseline;
      justify-content:center;
      gap: calc(6px * var(--clockScale));
      width:100%;
    }
    .big-time{
      font-size: calc(34px * var(--clockScale));
      font-weight: 800;
      letter-spacing: 0.2px;
      line-height: 1.0;
    }
    .seconds{
      font-size: calc(13px * (0.92 * var(--clockScale)));
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.2px;
      transform: translateY(calc(-2px * var(--clockScale)));
      min-width: calc(18px * var(--clockScale));
      text-align:left;
    }
    .date-line{
      font-size: calc(13px * (0.92 * var(--clockScale)));
      color: var(--muted);
      display:flex;
      align-items:center;
      justify-content:center;
      gap: calc(8px * var(--clockScale));
      width:100%;
    }
    .subline{
      font-size: calc(12.5px * (0.92 * var(--clockScale)));
      color: var(--muted);
      line-height: calc(1.2rem * var(--clockScale));
    }

    /* ====== Chat content ====== */
    .chat-row{
      width:100%;
      display:flex;
      align-items:center;
      gap: 10px;
    }
    .cmd{
      flex:1 1 auto;
      height: 44px;
      border-radius: 999px;
      border: 1px solid var(--stroke2);
      background: rgba(0,0,0,0.12);
      color: var(--text);
      padding: 0 14px;
      outline: none;
      font-size: 14px;
    }
    html[data-theme="light"] .cmd{ background: rgba(255,255,255,0.40); }
    .cmd:focus{
      box-shadow: 0 0 0 6px rgba(var(--accent),0.18);
      border-color: rgba(var(--accent),0.45);
    }
    .hint{
      flex:0 0 auto;
      font-size: 12px;
      color: var(--muted);
      white-space:nowrap;
    }

    /* ====== Theme pill content (keeps visual) ====== */
    .theme-widget .pad{ padding: 12px; width: 100%; height: 100%; display:flex; align-items:center; justify-content:center; }
    .theme-pill{
      position:relative;
      width: 100%;
      height: 52px;
      border-radius: 999px;
      border: 1px solid var(--stroke2);
      background: rgba(0,0,0,0.10);
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 7px;
      touch-action:none;
    }
    html[data-theme="light"] .theme-pill{ background: rgba(255,255,255,0.35); }
    .theme-options{
      position:relative;
      width: 100%;
      height: 100%;
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      align-items:center;
      z-index: 2;
    }
    .theme-opt{
      display:flex;
      align-items:center;
      justify-content:center;
      font-size: 13px;
      color: var(--muted);
      user-select:none;
      cursor:pointer;
    }
    .theme-opt.active{ color: var(--text); }
    .ico{
      width: 18px;
      height: 18px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      opacity: 0.92;
    }
    .theme-thumb{
      position:absolute;
      top: 7px;
      bottom: 7px;
      width: calc((100% - 14px) / 3);
      left: 7px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255,255,255,0.28), rgba(255,255,255,0.14));
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.18),
        0 10px 24px rgba(0,0,0,0.18);
      backdrop-filter: blur(14px) saturate(140%);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
      transform: translate3d(0,0,0);
      transition: transform 240ms var(--ease);
      z-index: 1;
      will-change: transform;
    }
    html[data-theme="light"] .theme-thumb{
      background: linear-gradient(180deg, rgba(255,255,255,0.70), rgba(255,255,255,0.35));
      border: 1px solid rgba(10,20,40,0.12);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.35),
        0 10px 20px rgba(10,20,40,0.12);
    }

    /* ====== Menu button ====== */
    .menu-widget .pad{
      padding: 8px;
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .menu-btn{
      width: 100%;
      height: 100%;
      aspect-ratio: 1 / 1;
      max-width: 64px;
      max-height: 64px;
      border-radius: 18px;
      border: 1px solid var(--stroke2);
      background: linear-gradient(180deg, rgba(255,255,255,0.14), rgba(255,255,255,0.08));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.14),
        0 12px 26px rgba(0,0,0,0.18);
      backdrop-filter: blur(14px) saturate(140%);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      user-select:none;
      touch-action: manipulation;
      transition: transform 160ms var(--ease), filter 160ms var(--ease);
    }
    html[data-theme="light"] .menu-btn{
      background: linear-gradient(180deg, rgba(255,255,255,0.75), rgba(255,255,255,0.38));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.40),
        0 12px 22px rgba(10,20,40,0.12);
    }
    .menu-btn:active{ transform: scale(0.98); }
    .menu-btn svg{ opacity: 0.92; }

    /* ====== Sidebar, Auth, Account, Profile Editor ... ====== */
    /* (CSS original continua igual daqui pra baixo — sem mudanças estruturais) */

    /* ===== Sidebar ====== */
    .sidebar-overlay{
      position:absolute;
      inset: var(--pad);
      border-radius: var(--radius2);
      z-index: 60;
      pointer-events:none;
      opacity:0;
      transition: opacity 220ms var(--ease);
      background: rgba(0,0,0,0.20);
      backdrop-filter: blur(0px);
      -webkit-backdrop-filter: blur(0px);
    }
    html[data-theme="light"] .sidebar-overlay{ background: rgba(0,0,0,0.10); }
    .sidebar-overlay.open{
      opacity: 1;
      pointer-events:auto;
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }

    .sidebar{
      position:absolute;
      top: 10px;
      left: 10px;
      width: min(380px, calc(100% - 20px));
      height: calc(100% - 20px);
      border-radius: 26px;
      border: 1px solid var(--stroke);
      background: linear-gradient(180deg, var(--glass), var(--glass2));
      backdrop-filter: blur(18px) saturate(140%);
      -webkit-backdrop-filter: blur(18px) saturate(140%);
      box-shadow: 0 24px 70px rgba(0,0,0,0.35);
      transform: translateX(calc(-100% - 18px));
      transition: transform 240ms var(--ease);
      overflow:hidden;
    }
    .sidebar-overlay.open .sidebar{ transform: translateX(0); }

    /* ... (SEU CSS segue igual — mantive tudo da sua versão) ... */

  </style>

    function initFirebase(){

        if(!hasReal) return false;

    /* =========================================================
       Helpers: Photo URL input memory (não preencher com photo atual)
       ========================================================= */
    const PHOTO_URL_LAST_KEY = 'terminal.profile.photoUrlLast.v1';

    function getPhotoUrlLastKey(){
      // por profile (guest ou uid)
      const base = (activeProfileId === 'guest') ? 'guest' : activeProfileId.replace('uid:','uid_');
      return `${PHOTO_URL_LAST_KEY}.${base}`;
    }

    function getPhotoUrlLast(){
      try{ return String(localStorage.getItem(getPhotoUrlLastKey()) || ''); }catch(e){ return ''; }
    }
    function setPhotoUrlLast(v){
      try{ localStorage.setItem(getPhotoUrlLastKey(), String(v || '')); }catch(e){}
    }

    function isDataUrl(str){
      return typeof str === 'string' && str.trim().toLowerCase().startsWith('data:');
    }

    /* =========================================================
       Helpers: Resize/compress + upload to Storage (para não estourar photoURL)
       ========================================================= */
    async function fileToJpegBlob(file, maxSide=512, quality=0.86){
      // ✅ reduz e comprime antes de subir
      const img = await new Promise((resolve, reject)=>{
        const im = new Image();
        im.onload = ()=>resolve(im);
        im.onerror = reject;
        im.src = URL.createObjectURL(file);
      });

      const w = img.naturalWidth || img.width;
      const h = img.naturalHeight || img.height;

      const scale = Math.min(1, maxSide / Math.max(w, h));
      const tw = Math.max(1, Math.round(w * scale));
      const th = Math.max(1, Math.round(h * scale));

      const canvas = document.createElement('canvas');
      canvas.width = tw;
      canvas.height = th;

      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, tw, th);

      URL.revokeObjectURL(img.src);

      const blob = await new Promise((resolve)=>canvas.toBlob(resolve, 'image/jpeg', quality));
      if(!blob) throw new Error('Falha ao processar imagem.');
      return blob;
    }

    async function uploadAvatarAndGetUrl(file){
      if(!firebaseReady || !currentUser || !fbStorage) throw new Error('Storage indisponível.');
      const blob = await fileToJpegBlob(file, 640, 0.86);

      // ✅ caminho estável por user (sobrescreve)
      const path = `avatars/${currentUser.uid}/avatar.jpg`;
      const ref = fbStorage.ref().child(path);

      await ref.put(blob, { contentType: 'image/jpeg', cacheControl: 'public,max-age=86400' });
      const url = await ref.getDownloadURL();
      return url;
    }

    /* =========================================================

       - Mantive tudo como estava
       - A PARTE 2 vai substituir somente o bloco de salvar perfil
       ========================================================= */

    const stage = document.getElementById('stage');
    const area  = document.getElementById('area');
    const ghost = document.getElementById('ghost');
    const cmd   = document.getElementById('cmd');

    const clamp = (v, min, max) => Math.max(min, Math.min(max, v));
    const prefersDark = () => window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;

    /* ... (TODO SEU JS segue igual até chegar no Profile Editor) ... */

    /* ===== Profile Edit (WhatsApp-like) ===== */
    const profileOverlay = document.getElementById('profileOverlay');
    const profileClose = document.getElementById('profileClose');
    const profileCancel = document.getElementById('profileCancel');
    const profileSave = document.getElementById('profileSave');
    const profileName = document.getElementById('profileName');
    const profilePhotoUrl = document.getElementById('profilePhotoUrl');
    const profilePhotoFile = document.getElementById('profilePhotoFile');
    const profileError = document.getElementById('profileError');
    const profileAvatarPrev = document.getElementById('profileAvatarPrev');
    const profilePickBtn = document.getElementById('profilePickBtn');

    function showProfileError(msg){
      profileError.textContent = msg;
      profileError.style.display = 'block';
    }
    function clearProfileError(){
      profileError.style.display = 'none';
      profileError.textContent = '—';
    }

    function fileToDataUrl(file){
      return new Promise((resolve, reject)=>{
        const r = new FileReader();
        r.onload = ()=> resolve(String(r.result || ''));
        r.onerror = reject;
        r.readAsDataURL(file);
      });
    }

    function setProfileAvatarPreview(photo){
      profileAvatarPrev.innerHTML = '';
      if(photo){
        const img = document.createElement('img');
        img.src = photo;
        img.alt = 'avatar';
        profileAvatarPrev.appendChild(img);
      }else{
        const d = document.createElement('div');
        d.style.fontWeight = '900';
        d.style.color = 'var(--muted)';
        d.style.fontSize = '16px';
        d.textContent = '⌁';
        profileAvatarPrev.appendChild(d);
      }
      profileAvatarPrev.appendChild(profilePickBtn);
    }

    function getCurrentProfileView(){
      if(activeProfileId === 'guest'){
        const g = loadGuestProfile();
        return {
          name: g.name || 'Convidado',
          email: 'Sessão local',
          photo: g.photo || '',
          badge: 'Guest',
          photoUrlLast: g.photoUrlLast || getPhotoUrlLast() || ''
        };
      }
      if(currentUser){
        return {
          name: currentUser.displayName || 'Usuário',
          email: currentUser.email || '—',
          photo: currentUser.photoURL || '',
          badge: 'Sync',
          photoUrlLast: getPhotoUrlLast() || ''
        };
      }
      return { name:'Conta', email:'—', photo:'', badge:'—', photoUrlLast: getPhotoUrlLast() || '' };
    }

    function openProfileEditor(){
      clearProfileError();
      const p = getCurrentProfileView();
      profileName.value = p.name || '';

      // ✅ NÃO preencher com photo atual (do google/email).
      // ✅ Só mostra o último URL que o usuário digitou.
      profilePhotoUrl.value = p.photoUrlLast || '';
      profilePhotoFile.value = '';

      setProfileAvatarPreview(p.photo || '');
      profileOverlay.classList.add('open');
      profileOverlay.setAttribute('aria-hidden','false');
      setTimeout(()=>profileName.focus(), 60);
    }
    function closeProfileEditor(){
      profileOverlay.classList.remove('open');
      profileOverlay.setAttribute('aria-hidden','true');
    }

    profileClose.addEventListener('click', closeProfileEditor);
    profileCancel.addEventListener('click', closeProfileEditor);
    profileOverlay.addEventListener('pointerdown', (e)=>{
      if(e.target === profileOverlay) closeProfileEditor();
    });

    profilePickBtn.addEventListener('click', ()=>{
      profilePhotoFile.click();
    });

    profilePhotoFile.addEventListener('change', async ()=>{
      const f = profilePhotoFile.files && profilePhotoFile.files[0];
      if(!f) return;
      try{
        // preview local (pode ser dataURL, sem gravar no Auth)
        const dataUrl = await fileToDataUrl(f);
        setProfileAvatarPreview(dataUrl);
      }catch(e){}
    });

    async function saveProfileToCloud({name, photo, photoUrlLast}){
      const ref = userDocRef();
      if(!ref) return;
      await ref.set({
        profile: { name: name || '', photo: photo || '', photoUrlLast: photoUrlLast || '' },
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }, { merge: true });
    }

    document.getElementById('editProfileBtn').addEventListener('click', openProfileEditor);

  
    profileSave.addEventListener('click', async ()=>{
      clearProfileError();

      const name = String(profileName.value || '').trim();
      if(!name) return showProfileError('Digite um nome.');

      try{
        const f = profilePhotoFile.files && profilePhotoFile.files[0];
        const typedUrl = String(profilePhotoUrl.value || '').trim();

        // ✅ Guardar sempre o último URL digitado (para preencher o input da próxima vez)
        setPhotoUrlLast(typedUrl);

        let finalPhoto = '';
        let finalPhotoUrlLast = typedUrl;

        if(activeProfileId === 'guest'){
          // Guest: pode aceitar file (dataURL) OU URL
          if(f){
            finalPhoto = await fileToDataUrl(f); // ok para guest (local)
          }else{
            finalPhoto = typedUrl;
          }

          saveGuestProfile({ name, photo: finalPhoto, photoUrlLast: finalPhotoUrlLast });
          requestCloudSyncDebounced();
          closeProfileEditor();
          refreshAccountUI();
          return;
        }

        // Logged: precisa estar logado
        if(!firebaseReady || !currentUser) return showProfileError('Você precisa estar logado.');

        // Logged: se for file => subir no Storage (URL curta)
        if(f){
          finalPhoto = await uploadAvatarAndGetUrl(f); // ✅ URL curta do Storage
        }else{
          // Se for URL colada, bloquear dataURL (causa auth/invalid-profile-attribute)
          if(isDataUrl(typedUrl)) return showProfileError('URL inválida: use um link http(s) (não data:).');
          finalPhoto = typedUrl || '';
        }

        // ✅ Atualizar Auth com URL curta (ou vazia)
        await currentUser.updateProfile({
          displayName: name,
          photoURL: finalPhoto || ''
        });

        // ✅ Salvar também no Firestore (inclui photoUrlLast)
        await saveProfileToCloud({
          name,
          photo: finalPhoto || '',
          photoUrlLast: finalPhotoUrlLast || ''
        });

        // ✅ atualizar switcher
        upsertUsedAccount({
          key: 'uid:' + currentUser.uid,
          uid: currentUser.uid,
          email: currentUser.email || '',
          name,
          photo: finalPhoto || '',
          provider: (currentUser.providerData && currentUser.providerData[0] && currentUser.providerData[0].providerId) || 'password',
          lastAt: Date.now()
        });

        closeProfileEditor();
        refreshAccountUI();
      }catch(err){
        const m = (err && err.message) ? err.message : 'Erro ao salvar perfil.';
        showProfileError(m);
      }
    });

    /* =========================================================
       ✅ FIX: Load cloud trazendo profile.photoUrlLast + aplicando corretamente
       ========================================================= */
    async function loadFromCloudIfNeeded(){
      if(!getSyncEnabled()) return;
      if(!firebaseReady || !currentUser) return;

      try{
        const data = await loadSettingsFromCloud();
        if(!data) return;

        // ✅ Profile no topo (como você usa em saveProfileToCloud)
        const prof = data.profile || (data.profile && data.profile.profile) || null;

        // Seu documento salva assim:
        // { profile: { name, photo, photoUrlLast }, settings: {...} }
        // então:
        const pn = data.profile?.name || '';
        const pp = data.profile?.photo || '';
        const pul = data.profile?.photoUrlLast || '';

        // ✅ aplica no Auth (com try/catch)
        try{
          if(pn && (!currentUser.displayName || currentUser.displayName !== pn)){
            await currentUser.updateProfile({ displayName: pn });
          }
          if(pp && (!currentUser.photoURL || currentUser.photoURL !== pp)){
            // ⚠️ se por algum motivo veio dataURL do cloud, ignora (proteção)
            if(!isDataUrl(pp)) await currentUser.updateProfile({ photoURL: pp });
          }
        }catch(e){}

        // ✅ guarda o último url digitado localmente (não auto-popular com foto google)
        if(pul) setPhotoUrlLast(pul);

        const s = data.settings || {};
        if(s.themeMode != null) localStorage.setItem(getThemeKey(), String(s.themeMode));
        if(s.editMode != null)  localStorage.setItem(getEditKey(),  s.editMode ? '1' : '0');
        if(s.layoutJson != null) localStorage.setItem(getLayoutKey(), String(s.layoutJson));

      }catch(e){
        console.warn("Load cloud falhou:", e);
      }
    }

    /* =========================================================
       ✅ FIX: Save cloud também salva profile.photoUrlLast
       ========================================================= */
    async function saveToCloudNow(){
      if(!getSyncEnabled()) return;
      if(!firebaseReady || !currentUser) return;

      try{
        const themeMode = localStorage.getItem(getThemeKey()) || 'auto';
        const editMode = (localStorage.getItem(getEditKey()) || '0') === '1';
        const layoutJson = localStorage.getItem(getLayoutKey()) || '{}';

        await saveSettingsToCloud({ themeMode, editMode, layoutJson });

        const name = currentUser.displayName || '';
        const photo = currentUser.photoURL || '';
        const photoUrlLast = getPhotoUrlLast() || '';
        await saveProfileToCloud({ name, photo, photoUrlLast });
      }catch(e){
        console.warn("Save cloud falhou:", e);
      }
    }

    /* =========================================================
       ✅ Pequena proteção: refreshAccountUI não quebra se photo for dataUrl
       (não é obrigatório, mas evita bug visual se algum profile antigo tiver data:)
       ========================================================= */
    function setAvatarUI(photo){
      acctAvatarEl.innerHTML = '';
      if(photo){
        // se por acaso vier dataURL enorme, ainda dá pra renderizar; ok.
        const img = document.createElement('img');
        img.src = photo;
        img.alt = 'avatar';
        acctAvatarEl.appendChild(img);
      }else{
        const d = document.createElement('div');
        d.style.fontWeight = '900';
        d.style.color = 'var(--muted)';
        d.style.fontSize = '14px';
        d.textContent = '⌁';
        acctAvatarEl.appendChild(d);
      }
    }
    boot();
  </script>
</body>
